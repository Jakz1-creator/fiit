input[type=number]{-webkit-appearance:none;-moz-appearance:textfield}

.nb.act{color:#c8a45a}
.nb.act::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:2px;background:currentColor;border-radius:0 0 3px 3px}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
#splash{position:fixed;inset:0;z-index:9999;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.spark{position:absolute;border-radius:50%;pointer-events:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes splashOut{0%{opacity:1}85%{opacity:1;transform:scale(1.03)}100%{opacity:0;transform:scale(1.05)}}

@keyframes slideInRight{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.va-back{animation:slideInLeft .28s cubic-bezier(.32,.72,.0,1) forwards}
.va-up{animation:slideInUp .22s cubic-bezier(.32,.72,.0,1) forwards}

body.session-active{overflow:hidden;position:fixed;width:100%;height:100%}
body.session-active #nav{display:none}

// AUDIO
var _ac=null;
function getAC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function beep(f,d,v,t){try{var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}}
function playAlert(){beep(660,.15,.4);setTimeout(function(){beep(880,.15,.4);},180);setTimeout(function(){beep(1100,.25,.5);},360);}
function playDone(){beep(440,.2,.3);setTimeout(function(){beep(554,.2,.3);},220);setTimeout(function(){beep(660,.4,.35);},440);}
function vib(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}

// NOTIFICATIONS
var notifOK = false;
function requestNotifPermission() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'granted') { notifOK = true; return; }
  if(Notification.permission !== 'denied') {
    Notification.requestPermission().then(function(p) {
      notifOK = p === 'granted';
    });
  }
}
function scheduleNotif(secs, title, body) {
  if(!notifOK) return;
  // Cancel any previous scheduled notif
  if(window._notifTimeout) clearTimeout(window._notifTimeout);
  window._notifTimeout = setTimeout(function() {
    try {
      var n = new Notification(title || 'JACOBZ', {
        body: body || 'Repos termine - C\'est parti !',
        icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'%3E%3Crect width=\'192\' height=\'192\' rx=\'38\' fill=\'%23080808\'/%3E%3Ctext x=\'96\' y=\'148\' font-family=\'serif\' font-weight=\'900\' font-size=\'130\' text-anchor=\'middle\' fill=\'%23c8a45a\'%3EJ%3C/text%3E%3C/svg%3E',
        badge: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'%3E%3Crect width=\'192\' height=\'192\' rx=\'38\' fill=\'%23080808\'/%3E%3Ctext x=\'96\' y=\'148\' font-family=\'serif\' font-weight=\'900\' font-size=\'130\' text-anchor=\'middle\' fill=\'%23c8a45a\'%3EJ%3C/text%3E%3C/svg%3E',
        silent: false,
        vibrate: [300, 100, 300]
      });
      setTimeout(function() { n.close(); }, 5000);
    } catch(e) {}
  }, secs * 1000);
}
function cancelNotif() {
  if(window._notifTimeout) { clearTimeout(window._notifTimeout); window._notifTimeout = null; }
}
var wl=null;
function reqWL(){try{if('wakeLock' in navigator)navigator.wakeLock.request('screen').then(function(w){wl=w;});}catch(e){}}
function relWL(){if(wl){wl.release();wl=null;}}

// INTRO
function introSound(){
  try{
    var ctx=getAC();
    [0,.08,.16].forEach(function(t){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=55;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(.6,ctx.currentTime+t+.04);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.28);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.3);
    });
    setTimeout(function(){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='triangle';
      o.frequency.setValueAtTime(220,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(440,ctx.currentTime+.6);
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(.25,ctx.currentTime+.1);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.8);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+.9);
    },300);
    [440,554,659,880].forEach(function(f,i){setTimeout(function(){beep(f,.35,.12);},600+i*90);});
  }catch(e){}
}
function showIntro(){
  var sp=document.createElement('div');sp.id='splash';
  var w=document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;position:relative';
  var J=document.createElement('div');
  J.style.cssText="font-family:'Bebas Neue',cursive;font-size:120px;color:#c8a45a;line-height:.85;letter-spacing:-4px;opacity:0;animation:fadeUp .5s .2s ease forwards,glow 2s .7s ease-in-out infinite";

  var rest=document.createElement('div');
  rest.style.cssText="font-family:'Bebas Neue',cursive;font-size:40px;color:#fff;letter-spacing:16px;opacity:0;animation:fadeUp .5s .45s ease forwards;margin-top:-10px";
  rest.textContent='ACOBZ';
  var line=document.createElement('div');
  line.style.cssText='height:2px;background:linear-gradient(90deg,transparent,#c8a45a,transparent);margin-top:16px;opacity:0;width:0;animation:lineAnim .6s .7s ease forwards';
  var tag=document.createElement('div');
  tag.style.cssText="font-family:'DM Sans',system-ui;font-size:11px;color:#666;letter-spacing:5px;margin-top:18px;opacity:0;animation:fadeUp .5s .9s ease forwards";
  tag.textContent='16-WEEK HYBRID PROGRAM';
  w.appendChild(J);w.appendChild(rest);w.appendChild(line);w.appendChild(tag);
  sp.appendChild(w);document.body.appendChild(sp);
  setTimeout(function(){
    introSound();
    for(var i=0;i<30;i++){
      var s=document.createElement('div');s.className='spark';
      var angle=Math.random()*360;var dist=70+Math.random()*130;
      var size=1+Math.random()*3;
      var tx=Math.cos(angle*Math.PI/180)*dist+'px';
      var ty=Math.sin(angle*Math.PI/180)*dist+'px';
      var col=Math.random()>.4?'#c8a45a':'#fff';
      s.style.cssText='left:50%;top:50%;width:'+size+'px;height:'+size+'px;background:'+col+';--tx:'+tx+';--ty:'+ty+';animation:sparkAnim '+(0.4+Math.random()*0.5)+'s '+(Math.random()*0.3)+'s ease-out forwards';
      sp.appendChild(s);
    }
  },700);
  setTimeout(function(){
    sp.style.animation='splashOut .55s ease forwards';
    setTimeout(function(){if(sp.parentNode)sp.parentNode.removeChild(sp);},560);
  },2700);
}

var RECOVERY_H={chest:48,back:48,shoulders:48,quads:72,hamstrings:72,glutes:72,biceps:36,triceps:36,core:24,calves:24};
function getMuscleRecovery(){
  var now=Date.now();
  var lastHit={};
  var dates=ST.dates||[];
  var lastDate=dates.length?new Date(dates[dates.length-1]).getTime():0;
  Object.keys(ST.logs).forEach(function(k){
    var l=ST.logs[k];if(!l||!l.done)return;
    var parts=k.split('_');if(parts.length<3)return;
    var exId=parts[2];
    var ex=null;
    SESSIONS.forEach(function(s){Object.keys(s.phaseExercises).forEach(function(p){s.phaseExercises[p].forEach(function(e){if(e.id===exId)ex=e;});});});
    if(!ex||!ex.mus)return;
    if(!lastHit[ex.mus]||lastDate>lastHit[ex.mus])lastHit[ex.mus]=lastDate;
  });
  var result={};
  Object.keys(RECOVERY_H).forEach(function(mus){
    var req=RECOVERY_H[mus]*3600*1000;
    if(!lastHit[mus]){result[mus]=1;return;}
    result[mus]=Math.min(1,(now-lastHit[mus])/req);
  });
  return result;
}

function shareSessionImage(sessName,doneSets,elapsed,prCount,phColor){
  try{
    var canvas=document.createElement('canvas');canvas.width=800;canvas.height=800;
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='#080808';ctx.fillRect(0,0,800,800);
    ctx.strokeStyle=phColor;ctx.lineWidth=4;ctx.strokeRect(16,16,768,768);
    ctx.strokeStyle=phColor+'40';ctx.lineWidth=1;ctx.strokeRect(28,28,744,744);
    ctx.fillStyle=phColor;ctx.font='bold 26px Georgia,serif';ctx.textAlign='center';
    ctx.fillText('JACOBZ - SEANCE COMPLETE',400,75);
    ctx.fillStyle='#fff';ctx.font='bold 68px Georgia,serif';
    ctx.fillText(sessName.toUpperCase(),400,170);
    ctx.strokeStyle=phColor+'60';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(80,200);ctx.lineTo(720,200);ctx.stroke();
    [{l:'SERIES',v:String(doneSets)},{l:'DUREE',v:elapsed},{l:'RECORDS',v:String(prCount)}].forEach(function(st,i){
      var x=155+i*245;
      ctx.fillStyle=phColor;ctx.font='bold 56px Georgia,serif';ctx.textAlign='center';ctx.fillText(st.v,x,300);
      ctx.fillStyle='#666';ctx.font='18px Georgia,serif';ctx.fillText(st.l,x,332);
    });
    ctx.beginPath();ctx.moveTo(80,365);ctx.lineTo(720,365);ctx.stroke();
    ctx.fillStyle=phColor+'80';ctx.font='20px Georgia,serif';ctx.textAlign='center';
    ctx.fillText('THOR x ANATOLY  -  '+new Date().toLocaleDateString('fr-FR'),400,740);
    if(navigator.share){
      canvas.toBlob(function(blob){
        var file=new File([blob],'jacobz.png',{type:'image/png'});
        navigator.share({title:'JACOBZ - '+sessName,files:[file]}).catch(function(){
          var a=document.createElement('a');a.download='jacobz-'+sessName+'.png';a.href=canvas.toDataURL();a.click();
        });
      });
    }else{
      var a=document.createElement('a');a.download='jacobz-'+sessName+'.png';a.href=canvas.toDataURL();a.click();
    }
  }catch(e){alert('Partage non disponible sur ce navigateur');}
}

function calcStreak(){
  var dates=(ST.dates||[]).filter(function(v,i,a){return a.indexOf(v)===i;}).sort().reverse();
  if(!dates.length)return 0;
  var s=0,check=new Date().toISOString().split('T')[0];
  for(var i=0;i<dates.length;i++){
    if(dates[i]===check){s++;var p=new Date(check);p.setDate(p.getDate()-1);check=p.toISOString().split('T')[0];}
    else if(dates[i]<check)break;
  }
  return s;
}

        if(l&&l.done&&l.kg>0)v+=l.kg*l.reps;
      }
    });
  });
  return Math.round(v);
}
function best1RM(exId){
  var best=0;
  Object.keys(ST.logs).forEach(function(k){
    if(k.indexOf('_'+exId+'_')>=0){
      var l=ST.logs[k];
      if(l&&l.done&&l.kg>0){var r=rm1(l.kg,l.reps);if(r>best)best=r;}
    }
  });
  return best;
}
function lastPerf(exId,sId,setIdx,w){
  for(var ww=w-1;ww>=1;ww--){
    var l=ST.logs[ww+'_'+sId+'_'+exId+'_'+setIdx];
    if(l&&l.done&&l.kg>0)return{w:ww,kg:l.kg,reps:l.reps};
  }
  return null;
}
function sesStats(s){
  var exos=s.rftCircuit?getExosForSession(s):getExos(s);
  var total=0;exos.forEach(function(e){total+=e.sets;});
  var done=0;
  var prefix=s.rftCircuit?(ST.week+'_'+s.id+'_lvl'+RFT_LEVEL):ST.week;
  exos.forEach(function(ex){
    for(var i=0;i<ex.sets;i++){
      var k=s.rftCircuit?(prefix+'_'+ex.id+'_'+i):(ST.week+'_'+s.id+'_'+ex.id+'_'+i);
      var l=ST.logs[k];
      if(l&&l.done)done++;
    }
  });
  return{done:done,total:total};
}
function getMuscleLoad(){
  var muscles={chest:0,shoulders:0,triceps:0,back:0,biceps:0,quads:0,hamstrings:0,glutes:0,core:0,calves:0};
  var w=ST.week;
  SESSIONS.forEach(function(s){
    getExos(s,w).forEach(function(ex){
      var sets=0;
      for(var i=0;i<ex.sets;i++){
        var l=ST.logs[w+'_'+s.id+'_'+ex.id+'_'+i];
        if(l&&l.done)sets++;
      }
      if(sets>0&&ex.mus&&muscles[ex.mus]!==undefined)muscles[ex.mus]+=sets;
    });
  });
  var max=1;
  Object.keys(muscles).forEach(function(k){if(muscles[k]>max)max=muscles[k];});
  Object.keys(muscles).forEach(function(k){muscles[k]=Math.min(1,muscles[k]/max);});
  return muscles;
}

// RENDER
var ANIM='fade'; // fade | fwd | back | up
function R(){
  var c=app();c.innerHTML='';

  if(n){

    if(SUBVIEW==='session'){
      n.classList.add('va-up');

}

// SET ROW
function buildSetRow(idx,ex,log,sKey,ph,wip,nextName){
  var isBW=!!ex.bwOnly,isBWL=!!ex.bw,isCond=!!ex.cond,isTimed=!!ex.timed;
  var suggested=(!isBW&&!isCond&&ex.baseKg)?calcKg(ex.baseKg,ph.id,wip,ex.incr):0;
  var entry=log||{kg:suggested,reps:ex.reps||8,done:false};
  var ac=isCond?'#64b4ff':isTimed?'#a78bfa':isBW?'#9aeebb':ph.color;
  var wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;gap:4px';
  var hist=lastPerf(ex.id,SESS&&SESS.id,idx,ST.week);
  if(hist&&!isBW&&!isCond){
    wrap.appendChild(div({fontSize:'10px',color:'#555',padding:'2px 12px'},'Sem.'+hist.w+': '+hist.kg+'kg x '+hist.reps));
  }
  var rowBg=entry.done?(isCond?'rgba(100,180,255,.07)':isBW?'rgba(154,238,187,.07)':'#161208'):'#111';
  var borderC=entry.done?(isCond?'rgba(100,180,255,.3)':isBW?'rgba(154,238,187,.3)':ph.color+'35'):'#1e1e1e';
  var row=div({display:'flex',alignItems:'center',gap:'8px',padding:'10px 12px',background:rowBg,borderRadius:'10px',border:'1px solid '+borderC});
  var numBg=entry.done?(isCond?'#64b4ff':isBW?'#9aeebb':ph.color):'#1e1e1e';
  row.appendChild(div({width:'27px',height:'27px',borderRadius:'50%',flexShrink:'0',background:numBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',color:entry.done?'#000':'#555',fontFamily:'Bebas Neue,cursive'},String(idx+1)));

  function save(ne){
    var k=sKey+'_'+ex.id+'_'+idx;
    var nl=Object.assign({},ST.logs);nl[k]=ne;
    var np=Object.assign({},ST.prs);
    if(ne.done){
      if(!isBW&&!isCond&&ne.kg>0){
        var pr=ST.prs[ex.id];
        if(!pr||ne.kg>pr.kg||(ne.kg===pr.kg&&ne.reps>pr.reps))np[ex.id]={kg:ne.kg,reps:ne.reps,date:new Date().toLocaleDateString('fr-FR')};
      }else{
        var pr2=ST.prs[ex.id];
        if(!pr2||ne.reps>pr2.reps)np[ex.id]={kg:0,reps:ne.reps,date:new Date().toLocaleDateString('fr-FR')};
      }
      if(!log||!log.done)if(ex.rest>0)startTimer(ex.rest,ex.name,nextName);
    }
    ST=Object.assign({},ST,{logs:nl,prs:np});saveS(ST);safeR();
  }

  if(isBW||isCond||isTimed){
    var color=isCond?'#64b4ff':isTimed?'#a78bfa':'#9aeebb';
    var label=isCond?'REP':isTimed?'SEC':'BW';
    var rb=div({display:'flex',alignItems:'center',gap:'8px',flex:'1',justifyContent:'center'});
    rb.appendChild(div({fontSize:'10px',color:color+'70',letterSpacing:'3px',flexShrink:'0'},label));
    rb.appendChild(smBtn('-',function(){save(Object.assign({},entry,{reps:Math.max(10,entry.reps-(isTimed?5:1))}));}));
    rb.appendChild(div({width:'44px',textAlign:'center',fontFamily:'Bebas Neue,cursive',fontSize:'24px',color:color},String(entry.reps)));
    rb.appendChild(smBtn('+',function(){save(Object.assign({},entry,{reps:entry.reps+(isTimed?5:1)}));}));
    rb.appendChild(div({fontSize:'10px',color:color+'60',letterSpacing:'2px',flexShrink:'0'},isTimed?'s':'REPS'));
    row.appendChild(rb);
  }else{
    var kb=div({display:'flex',alignItems:'center',gap:'5px',flex:'1.4'});
    kb.appendChild(div({fontSize:'9px',color:isBWL?'#c8a45a80':'#555',letterSpacing:'2px',flexShrink:'0'},isBWL?'BW+':'KG'));
    kb.appendChild(smBtn('-',function(){save(Object.assign({},entry,{kg:Math.max(0,Math.round((entry.kg-2.5)*2)/2)}));}));
    var ki=document.createElement('input');ki.type='number';ki.value=String(entry.kg);
    ki.style.cssText='width:52px;text-align:center;background:#1a1a1a;border:1px solid #252525;border-radius:7px;color:'+ph.color+';font-size:16px;font-weight:700;padding:5px 2px;font-family:Bebas Neue,cursive';
    ki.addEventListener('change',function(){save(Object.assign({},entry,{kg:parseFloat(ki.value)||0}));});
    kb.appendChild(ki);
    kb.appendChild(smBtn('+',function(){save(Object.assign({},entry,{kg:Math.round((entry.kg+2.5)*2)/2}));}));
    kb.appendChild(div({fontSize:'9px',color:'#555'},'kg'));
    row.appendChild(kb);
    var rp=div({display:'flex',alignItems:'center',gap:'5px',flex:'1'});
    rp.appendChild(div({fontSize:'9px',color:'#555',letterSpacing:'2px',flexShrink:'0'},'REPS'));
    rp.appendChild(smBtn('-',function(){save(Object.assign({},entry,{reps:Math.max(1,entry.reps-1)}));}));
    rp.appendChild(div({width:'32px',textAlign:'center',fontFamily:'Bebas Neue,cursive',fontSize:'21px',color:'#fff'},String(entry.reps)));
    rp.appendChild(smBtn('+',function(){save(Object.assign({},entry,{reps:entry.reps+1}));}));
    row.appendChild(rp);
  }

  var doneBtn=document.createElement('button');
  doneBtn.innerHTML='&#10003;';
  Object.assign(doneBtn.style,{
    width:'42px',height:'36px',borderRadius:'8px',cursor:'pointer',flexShrink:'0',
    background:entry.done?ac:'#1a1a1a',border:'2px solid '+(entry.done?ac:'#2a2a2a'),
    color:entry.done?'#000':'#333',fontSize:'15px',fontWeight:'700',
    display:'flex',alignItems:'center',justifyContent:'center'
  });
  doneBtn.addEventListener('click',function(){vib([20]);save(Object.assign({},entry,{done:!entry.done}));});
  row.appendChild(doneBtn);

  // Add swipe-to-validate (only for not-yet-done sets)
  if(!entry.done){
    row.className='set-row';
    var swipeHint=document.createElement('div');
    swipeHint.className='swipe-hint';
    swipeHint.style.color=ac;
    swipeHint.style.background='linear-gradient(90deg,'+ac+'18,'+ac+'08,transparent)';
    swipeHint.innerHTML='&rarr;';
    row.appendChild(swipeHint);
    var startX=0,currentX=0,swiping=false;
    row.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;swiping=true;},{passive:true});
    row.addEventListener('touchmove',function(e){
      if(!swiping)return;
      currentX=e.touches[0].clientX-startX;
      if(currentX>0&&currentX<200){
        swipeHint.style.width=Math.min(currentX,140)+'px';
        if(currentX>100){
          swipeHint.innerHTML='&#10003;';
          swipeHint.style.fontSize='14px';
          swipeHint.style.opacity='1';
        }else{
          swipeHint.innerHTML='&rarr;';
          swipeHint.style.fontSize='10px';
          swipeHint.style.opacity='.5';
        }
      }
    },{passive:true});
    row.addEventListener('touchend',function(){
      swiping=false;
      if(currentX>100){
        vib([30]);
        save(Object.assign({},entry,{done:true}));
      }else{
        swipeHint.style.width='0';
      }
      currentX=0;
    });
  }
  wrap.appendChild(row);
  return wrap;
}

// SESSION
// CIRCUIT SESSION (RFT format)
function buildCircuitSession(){
  var s=SESS,ph=getPhase(ST.week),sKey=ST.week+'_'+s.id+'_lvl'+RFT_LEVEL;
  var allExos=getExosForSession(s);

  // Group by bloc
  var blocs=[];
  allExos.forEach(function(ex){
    var bi=ex.bloc||0;
    if(!blocs[bi])blocs[bi]=[];
    blocs[bi].push(ex);
  });
  var mainBlocs=blocs.slice(0,4).filter(Boolean);
  var finExos=blocs[3]&&blocs[3][0]&&blocs[3][0].finisher?blocs[3]:[];
  // If bloc 3 is finisher, main blocs are 0,1,2 only
  if(finExos.length>0) mainBlocs=blocs.slice(0,3).filter(Boolean);
  var rounds=3;

  // Calculate state for each bloc
  function getBlocState(b){
    var bl=mainBlocs[b];
    if(!bl) return {curRound:0,done:false};
    for(var r=0;r<rounds;r++){
      var rDone=bl.every(function(ex){var l=ST.logs[sKey+'_'+ex.id+'_'+r];return l&&l.done;});
      if(!rDone) return {curRound:r,done:false};
    }
    return {curRound:rounds,done:true};
  }

  // Find current active bloc
  var activBloc=mainBlocs.length;
  for(var b=0;b<mainBlocs.length;b++){
    if(!getBlocState(b).done){activBloc=b;break;}
  }
  var allBlocsDone=activBloc>=mainBlocs.length;
  var allFinDone=finExos.length===0||finExos.every(function(ex){var l=ST.logs[sKey+'_'+ex.id+'_0'];return l&&l.done;});
  var allDone=allBlocsDone&&allFinDone;
  if(allDone){markToday();clearInterval(CRONIV);}

  var root=div({position:'fixed',top:'0',left:'0',right:'0',bottom:'0',background:'#080808',overflowY:'auto',WebkitOverflowScrolling:'touch',zIndex:'10',paddingTop:'env(safe-area-inset-top)',paddingBottom:'env(safe-area-inset-bottom)'});

  // Header
  var header=div({position:'sticky',top:'0',zIndex:'100',background:'#0a0a0a',borderBottom:'1px solid #181818',padding:'14px 16px 10px'});
  var hr=div({display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'});
  hr.appendChild(btn({background:'none',border:'1px solid #222',color:'#666',borderRadius:'8px',padding:'6px 12px',fontSize:'11px',letterSpacing:'2px',fontFamily:'Bebas Neue,cursive'},'RETOUR',function(){SUBVIEW='home';OPEN=null;stopTimer();relWL();clearInterval(CRONIV);ANIM='back';safeR();}));
  var tb=div({flex:'1'});
  tb.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'22px',color:ph.color,letterSpacing:'3px',lineHeight:'1'},s.name));
  var chrEl=document.createElement('span');chrEl.id='chrono';
  chrEl.style.cssText='font-size:10px;color:'+ph.color+';font-family:Bebas Neue,cursive;margin-top:2px;display:block';chrEl.textContent='0:00';
  tb.appendChild(chrEl);hr.appendChild(tb);
  if(allDone)hr.appendChild(div({background:ph.dim,border:'1px solid '+ph.color,borderRadius:'8px',padding:'4px 10px',fontSize:'10px',color:ph.color,letterSpacing:'2px',fontFamily:'Bebas Neue,cursive'},'DONE'));
  header.appendChild(hr);

  // Level selector
  var lvlRow=div({display:'flex',gap:'6px',marginBottom:'8px'});
  [{v:1,l:'DEBUTANT'},{v:2,l:'INTERMEDIAIRE'},{v:3,l:'EXPERT'}].forEach(function(lv){
    var isAct=RFT_LEVEL===lv.v;
    var lb=document.createElement('button');
    lb.textContent=lv.l;
    Object.assign(lb.style,{flex:'1',padding:'6px 4px',borderRadius:'8px',fontFamily:'Bebas Neue,cursive',fontSize:'10px',letterSpacing:'1px',cursor:'pointer',background:isAct?ph.color:'#1a1a1a',border:'1px solid '+(isAct?ph.color:'#2a2a2a'),color:isAct?'#000':'#555'});
    lb.addEventListener('click',function(){RFT_LEVEL=lv.v;localStorage.setItem('jz_rft_level',String(lv.v));safeR();});
    lvlRow.appendChild(lb);
  });
  header.appendChild(lvlRow);

  // Format pills
  var pills=div({display:'flex',gap:'6px',flexWrap:'wrap'});
  [{t:'3 ROUNDS',c:ph.color},{t:'10s ENTRE EXO',c:'#555'},{t:'30s ENTRE ROUNDS',c:'#555'}].forEach(function(it){
    pills.appendChild(div({background:it.c+'15',border:'1px solid '+it.c+'30',borderRadius:'20px',padding:'3px 10px',fontSize:'9px',color:it.c,letterSpacing:'2px',fontFamily:'Bebas Neue,cursive',whiteSpace:'nowrap'},it.t));
  });
  header.appendChild(pills);
  root.appendChild(header);

  if(allDone){
    // GG screen
    var elapsed=T0?Math.floor((Date.now()-T0)/1000):0;
    var ds=div({padding:'30px 20px',textAlign:'center'});

    ds.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'20px',color:'#aaa',letterSpacing:'3px',marginBottom:'6px'},s.name+' COMPLETE'));
    ds.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'14px',color:'#555',letterSpacing:'3px',marginBottom:'20px'},'Duree: '+fmtTime(elapsed)));
    var sg=div({background:'#0f0f0f',border:'1px solid '+ph.color+'30',borderRadius:'16px',padding:'20px',marginBottom:'16px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px'});
    [{v:String(mainBlocs.length),l:'BLOCS'},{v:String(rounds),l:'ROUNDS'},{v:String(calcStreak()),l:'STREAK'}].forEach(function(it){
      var c2=div({textAlign:'center'});
      c2.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'26px',color:ph.color,letterSpacing:'2px'},it.v));
      c2.appendChild(div({fontSize:'9px',color:'#555',letterSpacing:'2px',marginTop:'3px'},it.l));
      sg.appendChild(c2);
    });
    ds.appendChild(sg);
    ds.appendChild(btn({display:'block',width:'100%',padding:'16px',borderRadius:'14px',fontSize:'16px',letterSpacing:'3px',fontFamily:'Bebas Neue,cursive',background:ph.color,border:'none',color:'#000',cursor:'pointer'},'RETOUR ACCUEIL',function(){SUBVIEW='home';relWL();OPEN=null;ANIM='back';safeR();}));
    root.appendChild(ds);
  } else {
    var content=div({padding:'12px 14px 20px'});

    // Show ALL blocs
    mainBlocs.forEach(function(bl,bi){
      var bState=getBlocState(bi);
      var isActive=bi===activBloc;
      var isDone=bState.done;
      var isLocked=bi>activBloc;
      var curRound=bState.curRound;

      // Bloc card
      var blocCard=div({background:isDone?'#0a0f0a':isActive?'#0d0d0d':'#0a0a0a',
        border:'1px solid '+(isDone?ph.color+'50':isActive?ph.color+'40':'#181818'),
        borderRadius:'14px',marginBottom:'12px',overflow:'hidden'});

      // Bloc header
      var bh=div({padding:'12px 16px',display:'flex',alignItems:'center',gap:'10px',
        background:isDone?ph.color+'10':isActive?ph.color+'08':'transparent'});

      // Bloc number badge
      var badge=div({width:'36px',height:'36px',borderRadius:'10px',flexShrink:'0',
        background:isDone?ph.color:isActive?ph.color+'25':'#1a1a1a',
        border:'1px solid '+(isDone?ph.color:isActive?ph.color+'60':'#2a2a2a'),
        display:'flex',alignItems:'center',justifyContent:'center',
        fontFamily:'Bebas Neue,cursive',fontSize:'16px',

      badge.innerHTML=isDone?'&#10003;':String(bi+1);

      var bhInfo=div({flex:'1'});

      // Round dots for active bloc
      if(isActive&&!isDone){
        var rdots=div({display:'flex',gap:'4px',marginTop:'6px'});
        for(var rr=0;rr<rounds;rr++){
          var rDone=rr<curRound;
          var rCurr=rr===curRound;
          rdots.appendChild(div({width:rCurr?'20px':'8px',height:'8px',borderRadius:'4px',
            background:rDone?ph.color:rCurr?ph.color+'80':'#2a2a2a',
            transition:'all .3s'}));
        }
        rdots.appendChild(div({fontSize:'10px',color:ph.color,marginLeft:'6px',
          fontFamily:'Bebas Neue,cursive',letterSpacing:'1px'},'ROUND '+(curRound+1)+'/'+rounds));

      }else if(isDone){
        bhInfo.appendChild(div({fontSize:'10px',color:ph.color,marginTop:'3px',letterSpacing:'1px'},rounds+' rounds completes'));
      }else{
        bhInfo.appendChild(div({fontSize:'10px',color:'#444',marginTop:'3px',letterSpacing:'1px'},'En attente...'));
      }
      bh.appendChild(bhInfo);
      blocCard.appendChild(bh);

      // Exercises
      if(isActive||isDone){
        var exList=div({padding:'0 12px 12px',display:'flex',flexDirection:'column',gap:'6px'});
        bl.forEach(function(ex,i){
          var lkCurr=sKey+'_'+ex.id+'_'+curRound;
          var logCurr=ST.logs[lkCurr];
          var doneCurr=isDone||(logCurr&&logCurr.done);
          var ac='#a78bfa';
          var exCard=div({
            background:doneCurr?'rgba(167,139,250,.06)':'rgba(255,255,255,.02)',

            display:'flex',alignItems:'center',gap:'10px',
            opacity:isLocked?'0.4':'1'
          });
          // Number
          exCard.appendChild(div({width:'28px',height:'28px',borderRadius:'50%',flexShrink:'0',
            background:doneCurr?ac:'#1e1e1e',display:'flex',alignItems:'center',
            justifyContent:'center',fontSize:'12px',color:doneCurr?'#000':'#555',

// SMART HELPERS
function progressionVsPast(exId,weeksAgo){
  // Returns {curr, past, deltaPct} - comparing best 1RM in a window
  var curr=best1RMUntil(exId,ST.week);
  var past=best1RMUntil(exId,Math.max(1,ST.week-weeksAgo));
  if(!curr||!past)return null;
  return {curr:curr,past:past,deltaPct:Math.round(((curr-past)/past)*100)};
}
function best1RMUntil(exId,maxWeek){
  var best=0;
  Object.keys(ST.logs).forEach(function(k){
    if(k.indexOf('_'+exId+'_')<0)return;
    var w=parseInt(k.split('_')[0]);
    if(w>maxWeek)return;
    var l=ST.logs[k];
    if(l&&l.done&&l.kg>0){var r=rm1(l.kg,l.reps);if(r>best)best=r;}
  });
  return best;
}
function lastSessionDate(sessId){
  // Latest date a session was logged
  var latest=null;
  Object.keys(ST.logs).forEach(function(k){
    var parts=k.split('_');
    if(parts[1]===sessId&&ST.logs[k]&&ST.logs[k].done){
      var w=parseInt(parts[0]);
      if(!latest||w>latest)latest=w;
    }
  });
  return latest;
}
function daysSinceSession(sessId){
  // Approximate: based on completedDates closest to last log
  var latestWeek=lastSessionDate(sessId);
  if(!latestWeek)return null;
  // Use most recent training date in completedDates
  var dates=(ST.dates||[]).slice().sort();
  if(!dates.length)return null;
  var lastDate=new Date(dates[dates.length-1]);
  var days=Math.floor((Date.now()-lastDate.getTime())/(24*3600*1000));
  return days;
}
function recommendKg(ex,sessId){
  // If we have last 2 sessions data, recommend slight progression
  var pastLogs=[];
  for(var w=ST.week-1;w>=Math.max(1,ST.week-3);w--){
    for(var i=0;i<ex.sets;i++){
      var l=ST.logs[w+'_'+sessId+'_'+ex.id+'_'+i];
      if(l&&l.done&&l.kg>0)pastLogs.push({w:w,kg:l.kg,reps:l.reps});
    }
  }
  if(pastLogs.length<2)return null;
  // Average of last completed sets
  var avgKg=pastLogs.reduce(function(a,b){return a+b.kg;},0)/pastLogs.length;
  // If all hit target reps, suggest +2.5kg, else maintain
  var allHit=pastLogs.every(function(p){return p.reps>=ex.reps;});
  return allHit?Math.round((avgKg+2.5)*2)/2:Math.round(avgKg*2)/2;
}
function getSmartAlerts(){
  var alerts=[];
  // 1. Sessions not done in 7+ days
  SESSIONS.forEach(function(s){
    var lastW=lastSessionDate(s.id);
    if(!lastW)return;
    var weeksSince=ST.week-lastW;
    if(weeksSince>=2)alerts.push({type:'warn',icon:'!',msg:'Tu n\'as pas fait '+s.name+' depuis '+weeksSince+' semaines'});
  });
  // 2. PRs this week
  var thisWeekPRs=0;
  Object.keys(ST.prs).forEach(function(k){
    var pr=ST.prs[k];
    if(!pr.date)return;
    var parts=pr.date.split('/');
    if(parts.length!==3)return;
    var prDate=new Date(parts[2],parts[1]-1,parts[0]);
    var diff=(Date.now()-prDate.getTime())/(24*3600*1000);
    if(diff<=7)thisWeekPRs++;
  });
  if(thisWeekPRs>0)alerts.push({type:'good',icon:'+',msg:thisWeekPRs+' record(s) battu(s) cette semaine'});
  // 3. Streak milestone
  var s=calcStreak();
  if(s>=5)alerts.push({type:'good',icon:'*',msg:'Streak de '+s+' jours - constance exemplaire'});
  // 4. Progression on key lifts vs 4 weeks ago
  var keyLifts=[{id:'p1bp',n:'Bench'},{id:'l1sq',n:'Squat'},{id:'q1dl',n:'Deadlift'},{id:'p1ohp',n:'OHP'}];
  keyLifts.forEach(function(kl){
    var p=progressionVsPast(kl.id,4);
    if(p&&p.deltaPct>=8)alerts.push({type:'good',icon:'+',msg:kl.n+': +'+p.deltaPct+'% vs S-4 ('+p.past+'kg -> '+p.curr+'kg)'});
    else if(p&&p.deltaPct<=-5)alerts.push({type:'warn',icon:'-',msg:kl.n+': -'+Math.abs(p.deltaPct)+'% vs S-4'});
  });
  return alerts;
}

      rftLvlRow.appendChild(lb);
    });
    rftLvlBox.appendChild(rftLvlRow);
    content.appendChild(rftLvlBox);
  }

  // Filtered sessions
  var visibleSessions=SESSIONS.filter(function(s){
    if(activeFil==='all')return true;
    if(activeFil==='ABS')return s.id.indexOf('abs')===0;
    if(activeFil==='STREET')return s.id.indexOf('sw')===0;
    if(activeFil==='RFT')return s.tag==='RFT';
    if(activeFil==='THOR')return s.tag==='THOR'||s.tag==='ANATOLY';
    return true;
  });

  if(visibleSessions.length===0){
    content.appendChild(div({background:'#0f0f0f',border:'1px solid #1e1e1e',borderRadius:'14px',padding:'24px',textAlign:'center',color:'#444',fontSize:'12px',marginBottom:'10px'},'Aucune seance dans ce programme'));
  }
  visibleSessions.forEach(function(s){
    var st=sesStats(s),done=st.done,total=st.total;
    var pct=total>0?done/total:0,isDone=done===total&&total>0,started=done>0;
    var exos=getExos(s);
    var card=div({background:isDone?'#0e0d08':'#0f0f0f',border:'1px solid '+(isDone?ph.color+'60':started?ph.color+'28':'#181818'),borderRadius:'16px',padding:'16px',marginBottom:'10px',cursor:'pointer',position:'relative',overflow:'hidden'});
    if(started)card.appendChild(div({position:'absolute',left:'0',top:'0',bottom:'0',width:(pct*100)+'%',background:ph.color+'07'}));
    var row=div({display:'flex',gap:'14px',alignItems:'center',position:'relative'});
    row.appendChild(div({width:'46px',height:'46px',borderRadius:'12px',flexShrink:'0',background:isDone?ph.dim:'#151515',border:'1px solid '+(isDone?ph.color+'60':'#222'),display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:ph.color,letterSpacing:'1px'},isDone?'DONE':s.tag));
    var info=div({flex:'1',minWidth:'0'});
    info.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'21px',color:isDone?ph.color:'#ddd',letterSpacing:'2px',marginBottom:'2px'},s.name));
    info.appendChild(div({fontSize:'11px',color:'#555'},s.sub+' - '+exos.length+' exos - '+total+' series'));
    row.appendChild(info);
    var right=div({textAlign:'right',flexShrink:'0'});
    right.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'17px',color:done>0?ph.color:'#2a2a2a',letterSpacing:'1px'},done+'/'+total));
    right.appendChild(div({color:'#333',fontSize:'18px'},'>'));
    row.appendChild(right);card.appendChild(row);
    (function(sess){card.addEventListener('click',function(){SESS=sess;wuChecks={};OPEN=null;SUBVIEW='warmup';ANIM='fwd';safeR();});})(s);
    content.appendChild(card);
  });

  // Reset (double-tap)
  var rb=document.createElement('button');
  rb.textContent='RESET SEMAINE '+ST.week;
  Object.assign(rb.style,{display:'block',margin:'24px auto 0',background:'none',border:'1px solid #1e1e1e',color:'#383838',borderRadius:'8px',padding:'8px 22px',fontSize:'9px',letterSpacing:'3px',fontFamily:'Bebas Neue,cursive',cursor:'pointer'});
  rb.dataset.confirm='0';
  rb.addEventListener('click',function(){
    if(rb.dataset.confirm!=='1'){
      rb.textContent='CONFIRMER ?';rb.style.color='#e85e1a';rb.style.borderColor='#e85e1a40';rb.dataset.confirm='1';
      setTimeout(function(){if(rb.dataset.confirm==='1'){rb.textContent='RESET SEMAINE '+ST.week;rb.style.color='#383838';rb.style.borderColor='#1e1e1e';rb.dataset.confirm='0';}},3000);
      return;
    }
    var nl=Object.assign({},ST.logs);
    SESSIONS.forEach(function(s){getExos(s).forEach(function(ex){for(var i=0;i<ex.sets;i++)delete nl[ST.week+'_'+s.id+'_'+ex.id+'_'+i];});});
    ST=Object.assign({},ST,{logs:nl});saveS(ST);safeR();
  });
  content.appendChild(rb);root.appendChild(content);
  return root;
}

// STATS
function buildStats(){
  var ph=getPhase(ST.week),strk=calcStreak(),prs=Object.keys(ST.prs).length,weeksLeft=17-ST.week;
  var root=div({minHeight:'100vh',background:'#080808',paddingBottom:'80px'});
  var hero=div({background:'linear-gradient(175deg,#100c03,#080808)',borderBottom:'1px solid '+ph.color+'20',padding:'28px 20px 22px'});
  hero.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'32px',letterSpacing:'5px',color:ph.color,lineHeight:'1'},'STATISTIQUES'));
  root.appendChild(hero);
  var content=div({padding:'20px 16px'});

  var sg=div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'16px'});
  [{v:String(strk),l:'STREAK',c:strk>=3?'#e07c2a':'#c8a45a'},{v:String(weeksLeft),l:'SEMAINES REST',c:ph.color},{v:String(prs),l:'RECORDS',c:'#c8a45a'}].forEach(function(it){
    var c2=div({background:'#0f0f0f',borderRadius:'12px',padding:'14px 10px',border:'1px solid #181818',textAlign:'center'});
    c2.innerHTML='<div style="font-family:Bebas Neue,cursive;font-size:22px;color:'+it.c+';letter-spacing:2px;line-height:1">'+it.v+'</div><div style="font-size:8px;color:#444;letter-spacing:2px;margin-top:5px">'+it.l+'</div>';
    sg.appendChild(c2);
  });
  content.appendChild(sg);

  // Heatmap
  // Muscle recovery
  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'12px'},'RECUPERATION MUSCULAIRE'));
  var recov=getMuscleRecovery();
  var recovBox=div({background:'#0f0f0f',borderRadius:'14px',padding:'16px',marginBottom:'16px',border:'1px solid #181818'});
  var recovMuscles=[{k:'chest',n:'Pectoraux'},{k:'back',n:'Dos'},{k:'shoulders',n:'Epaules'},{k:'quads',n:'Quadriceps'},{k:'hamstrings',n:'Ischio'},{k:'glutes',n:'Fessiers'},{k:'biceps',n:'Biceps'},{k:'triceps',n:'Triceps'},{k:'core',n:'Core'},{k:'calves',n:'Mollets'}];
  recovMuscles.forEach(function(m){
    var val=recov[m.k]||0;
    var col=val>=0.9?'#9aeebb':val>=0.6?ph.color:val>=0.3?'#e07c2a':'#e85e1a';
    var label=val>=0.9?'OK':val>=0.6?'BIENTOT':val>=0.3?'FATIGUE':'AU REPOS';
    var row=div({display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'});
    row.appendChild(div({fontSize:'11px',color:'#777',width:'100px',flexShrink:'0'},m.n));
    var barWrap=div({flex:'1',height:'5px',background:'#1a1a1a',borderRadius:'3px',overflow:'hidden'});
    barWrap.appendChild(div({height:'100%',background:col,width:Math.round(val*100)+'%',borderRadius:'3px',transition:'width .6s ease'}));
    row.appendChild(barWrap);
    row.appendChild(div({fontSize:'9px',color:col,width:'54px',textAlign:'right',fontFamily:'Bebas Neue,cursive',letterSpacing:'1px'},label));
    recovBox.appendChild(row);
  });
  content.appendChild(recovBox);

  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'12px'},'HEATMAP MUSCULAIRE - SEMAINE EN COURS'));
  var load=getMuscleLoad();
  var hmBox=div({background:'#0f0f0f',borderRadius:'14px',padding:'16px',marginBottom:'20px',border:'1px solid #181818'});
  var muscles=[
    {k:'chest',n:'Pectoraux'},{k:'back',n:'Dos'},{k:'shoulders',n:'Epaules'},
    {k:'quads',n:'Quadriceps'},{k:'hamstrings',n:'Ischio-Jambiers'},{k:'glutes',n:'Fessiers'},
    {k:'biceps',n:'Biceps'},{k:'triceps',n:'Triceps'},{k:'core',n:'Abdos / Core'},{k:'calves',n:'Mollets'}
  ];
  muscles.forEach(function(m){
    var val=load[m.k]||0;
    var col=val>0.7?'#e85e1a':val>0.4?ph.color:val>0.1?ph.color+'80':'#1e1e1e';
    var row=div({display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'});
    row.appendChild(div({fontSize:'11px',color:'#777',width:'130px',flexShrink:'0'},m.n));
    var barWrap=div({flex:'1',height:'6px',background:'#1a1a1a',borderRadius:'3px',overflow:'hidden'});
    barWrap.appendChild(div({height:'100%',background:col,width:Math.round(val*100)+'%',borderRadius:'3px',transition:'width .6s ease'}));
    row.appendChild(barWrap);
    row.appendChild(div({fontSize:'9px',color:col,width:'30px',textAlign:'right',fontFamily:'Bebas Neue,cursive'},val>0?Math.round(val*100)+'%':'-'));
    hmBox.appendChild(row);
  });
  content.appendChild(hmBox);

  // Volume
  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'12px'},'VOLUME HEBDOMADAIRE'));
  var volData=[];
  for(var w=1;w<=ST.week;w++){var v=weekVol(w);if(v>0)volData.push({w:w,v:v});}
  if(volData.length>0){
    var maxV=0;volData.forEach(function(d){if(d.v>maxV)maxV=d.v;});
    var vBox=div({background:'#0f0f0f',borderRadius:'14px',padding:'16px',marginBottom:'20px',border:'1px solid #181818'});
    var bars=div({display:'flex',alignItems:'flex-end',gap:'4px',height:'80px'});
    for(var ww=1;ww<=ST.week;ww++){
      var vol=weekVol(ww),h2=vol>0?Math.max(4,Math.round((vol/maxV)*70)):2;
      bars.appendChild(div({flex:'1',background:ww===ST.week?ph.color:vol>0?ph.color+'60':'#1a1a1a',borderRadius:'3px 3px 0 0',height:h2+'px',minWidth:'4px'}));
    }
    vBox.appendChild(bars);
    if(volData.length>0)vBox.appendChild(div({fontSize:'11px',color:'#555',marginTop:'8px'},'Cette semaine: '+volData[volData.length-1].v.toLocaleString('fr-FR')+' kg'));
    content.appendChild(vBox);
  }else{
    content.appendChild(div({background:'#0f0f0f',borderRadius:'14px',padding:'20px',border:'1px solid #181818',textAlign:'center',color:'#444',fontSize:'12px',marginBottom:'16px'},'Pas encore de donnees. Complete une seance.'));
  }

  // 1RM
  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'12px'},'ESTIMATION 1RM'));
  var keyLifts=[{id:'p1bp',n:'Bench Press'},{id:'l1sq',n:'Squat'},{id:'q1dl',n:'Deadlift'},{id:'p1ohp',n:'OHP'},{id:'q1cur',n:'Curl Barre'},{id:'u1row',n:'Row Barre'}];
  var rmGrid=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'});
  keyLifts.forEach(function(kl){
    var b=best1RM(kl.id);
    var c2=div({background:'#0f0f0f',borderRadius:'12px',padding:'12px 14px',border:'1px solid '+(b>0?ph.color+'30':'#181818')});
    c2.innerHTML='<div style="font-size:11px;color:#555;margin-bottom:4px">'+kl.n+'</div><div style="font-family:Bebas Neue,cursive;font-size:'+(b>0?'22':'16')+'px;color:'+(b>0?ph.color:'#333')+';letter-spacing:2px">'+(b>0?b+'kg':'-')+'</div>';
    rmGrid.appendChild(c2);
  });
  content.appendChild(rmGrid);

  // Progression vs 4 weeks ago
  if(ST.week>=5){
    content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginTop:'16px',marginBottom:'12px'},'PROGRESSION SUR 4 SEMAINES'));
    var progGrid=div({display:'flex',flexDirection:'column',gap:'6px',marginBottom:'16px'});
    var keyLifts2=[{id:'p1bp',n:'Bench Press'},{id:'l1sq',n:'Squat'},{id:'q1dl',n:'Deadlift'},{id:'p1ohp',n:'OHP'}];
    var hasAny=false;
    keyLifts2.forEach(function(kl){
      var p=progressionVsPast(kl.id,4);
      if(!p)return;
      hasAny=true;
      var col=p.deltaPct>0?'#9aeebb':p.deltaPct<0?'#e07c2a':'#888';
      var sign=p.deltaPct>0?'+':'';
      var row=div({display:'flex',alignItems:'center',padding:'10px 14px',background:'#0f0f0f',border:'1px solid #181818',borderRadius:'10px'});
      row.appendChild(div({fontSize:'12px',color:'#aaa',flex:'1'},kl.n));
      row.appendChild(div({fontSize:'11px',color:'#666',marginRight:'10px'},p.past+'kg -> '+p.curr+'kg'));
      row.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'14px',color:col,letterSpacing:'1px',minWidth:'50px',textAlign:'right'},sign+p.deltaPct+'%'));
      progGrid.appendChild(row);
    });
    if(hasAny)content.appendChild(progGrid);
  }

  // PRs
  var prE=Object.keys(ST.prs);
  if(prE.length>0){
    content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginTop:'16px',marginBottom:'12px'},'RECORDS PERSONNELS'));
    var prB=div({background:'#0f0d08',border:'1px solid #c8a45a20',borderRadius:'14px',padding:'14px 16px'});
    prE.forEach(function(exId){
      var pr=ST.prs[exId];
      var ex=null;
      SESSIONS.forEach(function(s){Object.keys(s.phaseExercises).forEach(function(p){s.phaseExercises[p].forEach(function(e){if(e.id===exId)ex=e;});});});
      if(!ex)return;
      var vt=ex.bwOnly||ex.cond?(pr.reps+'r'):ex.bw?('BW+'+pr.kg+'kg x '+pr.reps):(pr.kg+'kg x '+pr.reps);
      var rmStr=(!ex.bwOnly&&!ex.cond&&pr.kg>0)?' (1RM~'+rm1(pr.kg,pr.reps)+'kg)':'';
      var prRow=div({display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #181818'});
      prRow.appendChild(div({fontSize:'12px',color:'#777'},ex.name));
      prRow.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'13px',color:ex.bwOnly?'#9aeebb':ex.cond?'#64b4ff':'#c8a45a',letterSpacing:'1px'},vt+rmStr));
      prB.appendChild(prRow);
    });
    content.appendChild(prB);
  }
  root.appendChild(content);
  return root;
}

// AGENDA
function buildAgenda(){
  var ph=getPhase(ST.week);
  var root=div({minHeight:'100vh',background:'#080808',paddingBottom:'80px'});
  var hero=div({background:'linear-gradient(175deg,#100c03,#080808)',borderBottom:'1px solid '+ph.color+'20',padding:'28px 20px 22px'});
  hero.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'32px',letterSpacing:'5px',color:ph.color,lineHeight:'1'},'AGENDA'));
  root.appendChild(hero);
  var content=div({padding:'20px 16px'});
  var dates={};(ST.dates||[]).forEach(function(d){dates[d]=true;});

  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'12px'},'30 DERNIERS JOURS'));
  var dots=div({display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'24px'});
  for(var i=29;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var str=d.toISOString().split('T')[0];
    var trained=!!dates[str];
    dots.appendChild(div({width:'24px',height:'24px',borderRadius:'6px',background:trained?ph.color:'#1a1a1a',border:'1px solid '+(trained?ph.color+'80':'#222')}));
  }
  content.appendChild(dots);

  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'12px'},'PROGRAMME 16 SEMAINES'));
  for(var ww=1;ww<=16;ww++){
    (function(week){
      var p2=getPhase(week),wip2=p2.weeks.indexOf(week)+1;
      var isCurr=week===ST.week,isPast=week<ST.week;
      var row=div({display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',background:isCurr?p2.dim:'#0f0f0f',border:'1px solid '+(isCurr?p2.color+'60':'#181818'),borderRadius:'10px',marginBottom:'6px'});
      row.appendChild(div({width:'36px',height:'36px',borderRadius:'8px',flexShrink:'0',background:isCurr?p2.color:isPast?p2.color+'20':'#1a1a1a',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Bebas Neue,cursive',fontSize:'16px',color:isCurr?'#000':isPast?p2.color+'80':'#444'},String(week)));
      var ri=div({flex:'1'});
      ri.innerHTML='<div style="font-family:Bebas Neue,cursive;font-size:14px;color:'+(isCurr?p2.color:isPast?'#555':'#444')+';letter-spacing:2px">'+p2.name+' S'+wip2+'/4</div><div style="font-size:10px;color:#444;margin-top:2px">'+p2.sub+'</div>';
      row.appendChild(ri);
      if(isCurr){var en=document.createElement('span');en.textContent='EN COURS';Object.assign(en.style,{fontSize:'9px',color:p2.color,border:'1px solid '+p2.color+'50',borderRadius:'4px',padding:'2px 6px',letterSpacing:'2px',fontFamily:'Bebas Neue,cursive'});row.appendChild(en);}
      content.appendChild(row);
    })(ww);
  }
  root.appendChild(content);
  return root;
}

requestNotifPermission();

  navigator.serviceWorker.register('sw.js').catch(function(){});
