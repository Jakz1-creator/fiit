<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='38' fill='%23080808'/%3E%3Ctext x='96' y='148' font-family='serif' font-weight='900' font-size='130' text-anchor='middle' fill='%23c8a45a'%3EJ%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#060606;color:#fff;font-family:'DM Sans',system-ui;min-height:100vh}
body{padding-top:env(safe-area-inset-top);padding-bottom:calc(64px + env(safe-area-inset-bottom))}
/* Ambient orbs for glassmorphism depth */
body::before{content:'';position:fixed;top:-150px;left:-80px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(200,164,90,0.09) 0%,transparent 65%);pointer-events:none;z-index:0;animation:orbDrift1 12s ease-in-out infinite}
body::after{content:'';position:fixed;bottom:-150px;right:-80px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(200,164,90,0.06) 0%,transparent 65%);pointer-events:none;z-index:0;animation:orbDrift2 15s ease-in-out infinite}
@keyframes orbDrift1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
@keyframes orbDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-30px)}}
/* Glassmorphism utility */
.glass{background:rgba(255,255,255,0.06)!important;backdrop-filter:blur(28px) saturate(180%)!important;-webkit-backdrop-filter:blur(28px) saturate(180%)!important;border:1px solid rgba(255,255,255,0.14)!important;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1.5px 0 rgba(255,255,255,0.22),inset 0 -1px 0 rgba(0,0,0,0.2)!important;position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.0) 15%,rgba(255,255,255,0.6) 40%,rgba(255,255,255,0.9) 50%,rgba(255,255,255,0.6) 60%,rgba(255,255,255,0.0) 85%,transparent 100%);pointer-events:none;z-index:2}
.glass-gold{background:rgba(200,164,90,0.09)!important;backdrop-filter:blur(28px) saturate(160%)!important;-webkit-backdrop-filter:blur(28px) saturate(160%)!important;border:1px solid rgba(200,164,90,0.22)!important;box-shadow:0 8px 32px rgba(0,0,0,0.35),inset 0 1.5px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(0,0,0,0.15)!important}
.glass-dark{background:rgba(0,0,0,0.5)!important;backdrop-filter:blur(36px) saturate(120%)!important;-webkit-backdrop-filter:blur(36px) saturate(120%)!important;border:1px solid rgba(255,255,255,0.08)!important;box-shadow:0 12px 40px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.1)!important}
input[type=number]{-webkit-appearance:none;-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
button{font-family:'DM Sans',system-ui;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s ease;touch-action:manipulation;user-select:none;-webkit-user-select:none}
button:active{transform:scale(0.96);transition:transform .1s ease}

/* MATCHED GEOMETRY TRANSITION */
@keyframes matchedExpand{
  0%{opacity:0;transform:scale(0.94)}
  100%{opacity:1;transform:scale(1)}}
@keyframes matchedCollapse{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(0.96)}}
.view-enter{animation:matchedExpand .38s cubic-bezier(.32,.72,0,1) both}
.view-exit{animation:matchedCollapse .22s cubic-bezier(.32,.72,0,1) both}
@keyframes navBounce{0%{transform:translateY(0)}30%{transform:translateY(-5px) scale(1.1)}65%{transform:translateY(2px) scale(0.96)}100%{transform:translateY(0) scale(1)}}
.nb-bounce svg,.nb-bounce i{animation:navBounce .4s cubic-bezier(.25,.46,.45,.94)}
@keyframes ctxFadeIn{from{opacity:0;transform:scale(0.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:sheetFadeIn .15s ease}
.ctx-menu{
  position:fixed;z-index:2001;
  background:rgba(28,28,30,0.92);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(255,255,255,0.14);
  box-shadow:0 20px 60px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.18);
  border-radius:16px;
  min-width:200px;
  overflow:hidden;
  animation:ctxFadeIn .2s cubic-bezier(.25,.46,.45,.94) both;
}
.ctx-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;
  background:none;border:none;
  color:#fff;font-size:15px;
  cursor:pointer;width:100%;text-align:left;
  border-bottom:1px solid rgba(255,255,255,0.07);
  transition:background .15s;
  touch-action:manipulation;
}
.ctx-item:last-child{border-bottom:none}
.ctx-item:active{background:rgba(255,255,255,0.1)}
.ctx-item.danger{color:#ff453a}
.ctx-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}

/* LIVE ACTIVITY */
@keyframes liveSlideDown{0%{transform:translateY(-60px) scale(0.9);opacity:0}70%{transform:translateY(4px) scale(1.01)}100%{transform:translateY(0) scale(1);opacity:1}}
.live-activity{
  position:fixed;top:calc(env(safe-area-inset-top) + 8px);
  left:50%;transform:translateX(-50%);
  z-index:900;
  background:rgba(18,18,18,0.88);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid rgba(255,255,255,0.14);
  box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.18);
  border-radius:30px;
  padding:7px 16px;
  display:flex;align-items:center;gap:10px;
  white-space:nowrap;
  animation:liveSlideDown .5s cubic-bezier(.25,.46,.45,.94) both;
  pointer-events:none;
}
.live-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:livePulse 1.5s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ANIMATED CHECKMARK */
@keyframes checkStroke{0%{stroke-dashoffset:30}100%{stroke-dashoffset:0}}
.check-svg{overflow:visible}
.check-path{stroke-dasharray:30;stroke-dashoffset:30;animation:checkStroke .35s cubic-bezier(.4,0,.2,1) forwards}
/* iOS 26 LIQUID GLASS LOGO */
@keyframes logoShimmer{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}
@keyframes logoGlow{
  0%,100%{filter:drop-shadow(0 0 12px rgba(200,164,90,0.4)) drop-shadow(0 0 30px rgba(200,164,90,0.15))}
  50%{filter:drop-shadow(0 0 24px rgba(200,164,90,0.8)) drop-shadow(0 0 60px rgba(200,164,90,0.35)) drop-shadow(0 0 100px rgba(200,164,90,0.15))}
}
@keyframes logoBreathe{
  0%,100%{transform:scale(1) translateY(0)}
  50%{transform:scale(1.015) translateY(-1px)}
}
@keyframes logoAppear{
  0%{opacity:0;transform:scale(0.8) translateY(12px);filter:blur(12px)}
  60%{opacity:1;transform:scale(1.04) translateY(-2px);filter:blur(0)}
  100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}
}
.liquid-logo{
  background:linear-gradient(
    105deg,
    var(--logo-c) 0%,
    var(--logo-c) 30%,
    rgba(255,255,255,0.95) 45%,
    var(--logo-c) 50%,
    var(--logo-c) 70%,
    rgba(255,255,255,0.7) 82%,
    var(--logo-c) 90%,
    var(--logo-c) 100%
  );
  background-size:300% auto;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:logoAppear .7s cubic-bezier(.25,.46,.45,.94) both;
  display:inline-block;
  position:relative;
  z-index:1;
}
/* Glass reflection under logo */
.liquid-logo-wrap{
  position:relative;
  display:inline-block;
}

.set-row{position:relative;overflow:hidden;touch-action:pan-y}
.swipe-hint{position:absolute;left:0;top:0;bottom:0;width:0;display:flex;align-items:center;padding-left:10px;font-family:'Bebas Neue',cursive;letter-spacing:3px;font-size:0;pointer-events:none;transition:width .08s ease,font-size .1s ease;opacity:.7;border-radius:10px 0 0 10px;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
#nav{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom) + 12px);
  left:50%;
  transform:translateX(-50%);
  z-index:500;
  background:rgba(18,18,18,0.75);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.15),0 0 0 0.5px rgba(255,255,255,0.05);
  border-radius:40px;
  display:flex;
  padding:6px 8px;
  gap:0;
  width:auto;
  min-width:240px;
}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.nb{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 14px;
  background:none;border:none;
  color:rgba(255,255,255,0.35);
  font-family:'Bebas Neue',cursive;
  font-size:8px;letter-spacing:2px;
  cursor:pointer;
  transition:all .3s cubic-bezier(.25,.46,.45,.94);
  position:relative;border-radius:32px;white-space:nowrap;
}
.nb.act{color:#fff;background:rgba(255,255,255,0.12);box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);}
.nb.act::before{display:none}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
#splash{position:fixed;inset:0;z-index:9999;background:#060606;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes splashVig{from{opacity:0}to{opacity:1}}
/* SPRING PHYSICS - iOS 26 */
:root{--spring:.55s cubic-bezier(.25,.46,.45,.94);--spring-fast:.35s cubic-bezier(.25,.46,.45,.94)}
@keyframes staggerIn{
  0%{opacity:0;transform:translateY(18px)}
  100%{opacity:1;transform:translateY(0)}}
/* Prevent iOS native callout on long press */
.stagger-card{
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  animation:staggerIn .4s cubic-bezier(.25,.46,.45,.94) both;
}
@keyframes springPop{
  0%{opacity:0;transform:scale(0.88)}
  60%{opacity:1;transform:scale(1.04)}
  100%{opacity:1;transform:scale(1)}}
/* BOTTOM SHEET */
@keyframes sheetSlideUp{
  0%{transform:translateY(100%)}
  100%{transform:translateY(0)}}
@keyframes sheetFadeIn{from{opacity:0}to{opacity:1}}
.bs-overlay{
  position:fixed;inset:0;z-index:1500;
  background:rgba(0,0,0,0.5);
  animation:sheetFadeIn .2s ease forwards;
  will-change:opacity;
}
.bs-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:1501;
  background:rgba(18,18,18,0.88);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:1px solid rgba(255,255,255,0.12);
  border-bottom:none;
  box-shadow:0 -8px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.18);
  border-radius:24px 24px 0 0;
  max-height:88vh;
  display:flex;flex-direction:column;
  animation:sheetSlideUp .35s ease both;
  will-change:transform;
  overflow:hidden;
}
.bs-header{
  flex-shrink:0;
  touch-action:none;
  -webkit-user-select:none;
  user-select:none;
  cursor:grab;
}
.bs-content{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  overscroll-behavior-y:contain;
  padding-bottom:calc(env(safe-area-inset-bottom) + 16px);
}
.bs-handle{
  width:100%;display:flex;justify-content:center;align-items:center;
  padding:14px 0 6px;background:transparent;
}
.spring-pop{animation:springPop var(--spring-fast) both}
@keyframes springSlideUp{
  0%{opacity:0;transform:translateY(30px) scale(0.95)}
  65%{transform:translateY(-4px) scale(1.01)}
  100%{opacity:1;transform:translateY(0) scale(1)}}
.spring-up{animation:springSlideUp var(--spring) both}
@keyframes springSlideDown{
  0%{opacity:0;transform:translateY(-24px) scale(0.95)}
  60%{transform:translateY(4px) scale(1.01)}
  100%{opacity:1;transform:translateY(0) scale(1)}}
.spring-down{animation:springSlideDown var(--spring) both}
/* Liquid glass for exercise cards */
.liq-card{position:relative;overflow:hidden}
.liq-card::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.06) 50%,transparent 60%);pointer-events:none;animation:shimmerOnce 1.2s ease-out forwards}
@keyframes shimmerOnce{0%{left:-100%}100%{left:150%}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes particleFloat{0%{transform:translateY(0) translateX(0);opacity:0}20%{opacity:.6}80%{opacity:.4}100%{transform:translateY(-120px) translateX(var(--px));opacity:0}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(4);opacity:0}}
.ripple-btn{position:relative;overflow:hidden}
.ripple-btn .rpl{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);animation:ripple .5s ease-out forwards;pointer-events:none}
@keyframes checkDraw{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
@keyframes prBurst{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes splashOut{from{opacity:1}to{opacity:0;transform:scale(1.02)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.va-fwd{animation:slideInRight .28s cubic-bezier(.32,.72,.0,1) forwards}
.va-back{animation:slideInLeft .28s cubic-bezier(.32,.72,.0,1) forwards}
.va-up{animation:slideInUp .22s cubic-bezier(.32,.72,.0,1) forwards}
.va-fade{animation:fadeIn .2s ease forwards}
/* Fullscreen workout mode */
body.session-active{overflow:hidden;position:fixed;width:100%;height:100%}
body.session-active #nav{display:none}
</style>

  </button>

    ANALYSE
  </button>

  </button>

<script>
// AUDIO
var _ac=null;
function getAC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function beep(f,d,v,t){try{var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}}
function playAlert(){beep(660,.15,.4);setTimeout(function(){beep(880,.15,.4);},180);setTimeout(function(){beep(1100,.25,.5);},360);}
function playDone(){beep(440,.2,.3);setTimeout(function(){beep(554,.2,.3);},220);setTimeout(function(){beep(660,.4,.35);},440);}
function vib(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}

// NOTIFICATIONS
var notifOK = false;
function requestNotifPermission() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'granted') { notifOK = true; return; }
  if(Notification.permission !== 'denied') {
    Notification.requestPermission().then(function(p) {
      notifOK = p === 'granted';
    });
  }
}
function scheduleNotif(secs, title, body) {
  if(!notifOK) return;
  // Cancel any previous scheduled notif
  if(window._notifTimeout) clearTimeout(window._notifTimeout);
  window._notifTimeout = setTimeout(function() {
    try {
      var n = new Notification(title || 'JACOBZ', {
        body: body || 'Repos termine - C\'est parti !',
        icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'%3E%3Crect width=\'192\' height=\'192\' rx=\'38\' fill=\'%23080808\'/%3E%3Ctext x=\'96\' y=\'148\' font-family=\'serif\' font-weight=\'900\' font-size=\'130\' text-anchor=\'middle\' fill=\'%23c8a45a\'%3EJ%3C/text%3E%3C/svg%3E',
        badge: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'%3E%3Crect width=\'192\' height=\'192\' rx=\'38\' fill=\'%23080808\'/%3E%3Ctext x=\'96\' y=\'148\' font-family=\'serif\' font-weight=\'900\' font-size=\'130\' text-anchor=\'middle\' fill=\'%23c8a45a\'%3EJ%3C/text%3E%3C/svg%3E',
        silent: false,
        vibrate: [300, 100, 300]
      });
      setTimeout(function() { n.close(); }, 5000);
    } catch(e) {}
  }, secs * 1000);
}
function cancelNotif() {
  if(window._notifTimeout) { clearTimeout(window._notifTimeout); window._notifTimeout = null; }
}
var wl=null;
function reqWL(){
  try{
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(w){
        wl=w;
        wl.addEventListener('release',function(){wl=null;});
      }).catch(function(){});
    }
  }catch(e){}
}
function relWL(){if(wl){wl.release();wl=null;}}
// Re-request WakeLock when app comes back to foreground
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&SUBVIEW==='session'){
    reqWL();
  }
});

// INTRO
function introSound(){
  try{
    var ctx=getAC();
    [0,.08,.16].forEach(function(t){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=55;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(.6,ctx.currentTime+t+.04);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.28);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.3);
    });
    setTimeout(function(){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='triangle';
      o.frequency.setValueAtTime(220,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(440,ctx.currentTime+.6);
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(.25,ctx.currentTime+.1);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.8);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+.9);
    },300);
    [440,554,659,880].forEach(function(f,i){setTimeout(function(){beep(f,.35,.12);},600+i*90);});
  }catch(e){}
}
function showIntro(){
  var sp=document.createElement('div');sp.id='splash';
  document.body.appendChild(sp);

  // Nolan vignette
  var vig=document.createElement('div');
  Object.assign(vig.style,{position:'absolute',inset:'0',background:'radial-gradient(ellipse at center,transparent 20%,rgba(0,0,0,0.85) 100%)',opacity:'0',transition:'opacity 3s ease',pointerEvents:'none'});
  sp.appendChild(vig);

  // Subtle glow behind logo
  var glow=document.createElement('div');
  Object.assign(glow.style,{position:'absolute',width:'400px',height:'120px',borderRadius:'50%',background:'radial-gradient(ellipse,rgba(200,164,90,0.07) 0%,transparent 70%)',opacity:'0',transition:'opacity 2s ease',pointerEvents:'none'});
  sp.appendChild(glow);

  // Center wrap
  var w=document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;gap:18px;position:relative;z-index:2';

  // THOR x ANATOLY
  var slogan=document.createElement('div');
  Object.assign(slogan.style,{fontFamily:'DM Sans,system-ui',fontSize:'10px',letterSpacing:'7px',color:'rgba(200,164,90,0)',textTransform:'uppercase',paddingRight:'7px',transition:'color 1.4s ease'});
  slogan.textContent='THOR x ANATOLY';
  w.appendChild(slogan);

  // JACOBZ — letter spacing collapse (Dior signature)
  var logo=document.createElement('div');
  Object.assign(logo.style,{fontFamily:"'Bebas Neue',cursive",fontSize:'68px',color:'rgba(200,164,90,0)',letterSpacing:'52px',paddingRight:'52px',transition:'color 1s ease,letter-spacing 1.8s cubic-bezier(.4,0,.2,1),padding-right 1.8s cubic-bezier(.4,0,.2,1)'});
  logo.textContent='JACOBZ';
  w.appendChild(logo);

  // Thin rule
  var rule=document.createElement('div');
  Object.assign(rule.style,{height:'0.5px',width:'0',background:'rgba(200,164,90,0.5)',transition:'width 1.2s cubic-bezier(.4,0,.2,1)'});

  // 16 Week
  var tag=document.createElement('div');
  Object.assign(tag.style,{fontFamily:'DM Sans,system-ui',fontSize:'9px',letterSpacing:'5px',color:'rgba(255,255,255,0)',textTransform:'uppercase',paddingRight:'5px',transition:'color 1s ease'});
  tag.textContent='16 Week Hybrid Program';
  w.appendChild(tag);

  sp.appendChild(w);

  // SEQUENCE
  // 0.1s: vignette
  setTimeout(function(){vig.style.opacity='1';},100);

  // 0.7s: slogan whispers in
  setTimeout(function(){slogan.style.color='rgba(200,164,90,0.4)';},700);

  // 1.1s: JACOBZ — colour + letter spacing collapse simultaneously
  setTimeout(function(){
    logo.style.color='rgba(200,164,90,1)';
    logo.style.letterSpacing='16px';
    logo.style.paddingRight='16px';
  },1100);

  // 2.0s: rule draws
  setTimeout(function(){rule.style.width='160px';},2000);

  // 2.3s: 16 Week
  setTimeout(function(){tag.style.color='rgba(255,255,255,0.3)';},2300);

  // 2.5s: glow settles
  setTimeout(function(){glow.style.opacity='1';},2500);

  // 3.6s: exit
  setTimeout(function(){
    sp.style.transition='opacity .6s ease';
    sp.style.opacity='0';
    setTimeout(function(){if(sp.parentNode)sp.parentNode.removeChild(sp);},650);
  },3600);
}

var RECOVERY_H={chest:48,back:48,shoulders:48,quads:72,hamstrings:72,glutes:72,biceps:36,triceps:36,core:24,calves:24};
// Universal exercise lookup
function findExById(exId){
  var found=null;
  SESSIONS.forEach(function(s){Object.keys(s.phaseExercises).forEach(function(p){s.phaseExercises[p].forEach(function(e){if(e.id===exId)found=e;});});});
  return found;
}
function getMuscleRecovery(){
  var now=Date.now();
  var lastHit={};
  var dates=ST.dates||[];
  var lastDate=dates.length?new Date(dates[dates.length-1]).getTime():0;
  Object.keys(ST.logs).forEach(function(k){
    var l=ST.logs[k];if(!l||!l.done)return;
    var parts=k.split('_');
    var exId=parts[2]||null;
    var ex=exId?findExById(exId):null;
    if(!ex&&parts[3])ex=findExById(parts[3]);
    if(!ex||!ex.mus)return;
    if(!lastHit[ex.mus]||lastDate>lastHit[ex.mus])lastHit[ex.mus]=lastDate;
  });
  var result={};
  Object.keys(RECOVERY_H).forEach(function(mus){
    var req=RECOVERY_H[mus]*3600*1000;
    if(!lastHit[mus]){result[mus]=1;return;}
    result[mus]=Math.min(1,(now-lastHit[mus])/req);
  });
  return result;
}

    ctx.fillStyle='#080808';ctx.fillRect(0,0,800,800);

    ctx.fillText('JACOBZ - SEANCE COMPLETE',400,75);
    ctx.fillStyle='#fff';ctx.font='bold 68px Georgia,serif';
    ctx.fillText(sessName.toUpperCase(),400,170);
    ctx.strokeStyle=phColor+'60';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(80,200);ctx.lineTo(720,200);ctx.stroke();
    [{l:'SERIES',v:String(doneSets)},{l:'DUREE',v:elapsed},{l:'RECORDS',v:String(prCount)}].forEach(function(st,i){

      ctx.fillStyle='#666';ctx.font='18px Georgia,serif';ctx.fillText(st.l,x,332);

    ctx.fillStyle=phColor+'80';ctx.font='20px Georgia,serif';ctx.textAlign='center';
    ctx.fillText('THOR x ANATOLY  -  '+new Date().toLocaleDateString('fr-FR'),400,740);
    if(navigator.share){
      canvas.toBlob(function(blob){
        var file=new File([blob],'jacobz.png',{type:'image/png'});
        navigator.share({title:'JACOBZ - '+sessName,files:[file]}).catch(function(){
          var a=document.createElement('a');a.download='jacobz-'+sessName+'.png';a.href=canvas.toDataURL();a.click();

function addRipple(el,e){
  if(!el.classList.contains('ripple-btn'))el.classList.add('ripple-btn');
  var r=document.createElement('span');r.className='rpl';
  var rect=el.getBoundingClientRect();
  var size=Math.max(rect.width,rect.height);
  var x=(e.clientX||rect.left+rect.width/2)-rect.left-size/2;
  var y=(e.clientY||rect.top+rect.height/2)-rect.top-size/2;
  Object.assign(r.style,{width:size+'px',height:size+'px',left:x+'px',top:y+'px'});
  el.appendChild(r);
  setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},500);
}

  var dates=(ST.dates||[]).filter(function(v,i,a){return a.indexOf(v)===i;}).sort().reverse();

  var s=0,check=new Date().toISOString().split('T')[0];

function weekVol(week){
  var v=0;
  SESSIONS.forEach(function(s){
    getExos(s,week).forEach(function(ex){
      for(var i=0;i<ex.sets;i++){
        var l=ST.logs[week+'_'+s.id+'_'+ex.id+'_'+i];
        if(l&&l.done&&l.kg>0)v+=l.kg*l.reps;
      }
    });
  });
  return Math.round(v);
}
function best1RM(exId){
  var best=0;
  Object.keys(ST.logs).forEach(function(k){
    if(k.indexOf('_'+exId+'_')>=0){
      var l=ST.logs[k];
      if(l&&l.done&&l.kg>0){var r=rm1(l.kg,l.reps);if(r>best)best=r;}
    }
  });
  return best;
}
function lastPerf(exId,sId,setIdx,w){
  for(var ww=w-1;ww>=1;ww--){
    var l=ST.logs[ww+'_'+sId+'_'+exId+'_'+setIdx];
    if(l&&l.done&&l.kg>0)return{w:ww,kg:l.kg,reps:l.reps};
  }
  return null;
}
function sesStats(s){
  var exos=s.rftCircuit?getExosForSession(s):getExos(s);
  var total=0;exos.forEach(function(e){total+=e.sets;});
  var done=0;
  var prefix=s.rftCircuit?(ST.week+'_'+s.id+'_lvl'+RFT_LEVEL):ST.week;
  exos.forEach(function(ex){
    for(var i=0;i<ex.sets;i++){
      var k=s.rftCircuit?(prefix+'_'+ex.id+'_'+i):(ST.week+'_'+s.id+'_'+ex.id+'_'+i);
      var l=ST.logs[k];
      if(l&&l.done)done++;
    }
  });
  return{done:done,total:total};
}
function getMuscleLoad(){
  var muscles={chest:0,shoulders:0,triceps:0,back:0,biceps:0,quads:0,hamstrings:0,glutes:0,core:0,calves:0};
  var w=ST.week;
  SESSIONS.forEach(function(s){
    var exos=s.rftCircuit?getExosForSession(s):getExos(s,w);
    var prefix=s.rftCircuit?(w+'_'+s.id+'_lvl'+RFT_LEVEL):(w+'_'+s.id);
    exos.forEach(function(ex){
      var sets=0;
      for(var i=0;i<(ex.sets||3);i++){
        var l=ST.logs[prefix+'_'+ex.id+'_'+i];
        if(l&&l.done)sets++;
      }
      if(sets>0&&ex.mus&&muscles[ex.mus]!==undefined)muscles[ex.mus]+=sets;
    });
  });
  var max=1;
  Object.keys(muscles).forEach(function(k){if(muscles[k]>max)max=muscles[k];});
  Object.keys(muscles).forEach(function(k){muscles[k]=Math.min(1,muscles[k]/max);});
  return muscles;
}

// RENDER
var ANIM='fade'; // fade | fwd | back | up
function R(){
  var c=app();c.innerHTML='';
  // Update phase tint on every render
  var _ph=getPhase(ST.week);
  var _pc=_ph.color;
  var _r=parseInt(_pc.slice(1,3),16),_g=parseInt(_pc.slice(3,5),16),_b=parseInt(_pc.slice(5,7),16);
  var _ts=document.getElementById('tint-style');
  if(_ts){_ts.textContent=[
    'body{background:rgb('+Math.round(_r*.04)+','+Math.round(_g*.03)+','+Math.round(_b*.02)+') !important}',
    'body::before{background:radial-gradient(circle,rgba('+_r+','+_g+','+_b+',0.11) 0%,transparent 65%)!important}',
    'body::after{background:radial-gradient(circle,rgba('+_r+','+_g+','+_b+',0.07) 0%,transparent 65%)!important}'
  ].join('');}
  var n=build();
  if(n){
    // Matched geometry — view enters with expand from card
    if(SUBVIEW==='session'||SUBVIEW==='warmup'){
      n.classList.add('view-enter');
      document.body.classList.add('session-active');
    }else{
      document.body.classList.remove('session-active');
      if(ANIM==='fwd')n.classList.add('va-fwd');
      else if(ANIM==='back'){n.classList.add('view-enter');} // back gets a gentle re-entry
      else if(ANIM==='up')n.classList.add('va-up');
      else n.classList.add('va-fade');
    }
    c.appendChild(n);
  }
  ANIM='fade';
}
function safeR(){
  setTimeout(function(){
    R();
    if(SHEET_STATE&&SUBVIEW==='session'){
      // Update sheet in-place without slide animation
      openBottomSheet(SHEET_STATE.ex,SHEET_STATE.sKey,SHEET_STATE.ph,SHEET_STATE.wip,SHEET_STATE.nextName,true);
    }
  },0);
}
function build(){
  if(SUBVIEW==='session')return SESS&&SESS.rftCircuit?buildCircuitSession():buildSession();
  if(SUBVIEW==='warmup')return buildWarmup();
  if(VIEW===1)return buildStats();
  if(VIEW===2)return buildAnalyse();
  if(VIEW===3)return buildContact();
  return buildHome();
}
function navTo(i){
  if(SUBVIEW!=='home')return;
  ANIM=i>VIEW?'fwd':'back';
  VIEW=i;
  var ph=getPhase(ST.week);
  document.querySelectorAll('.nb').forEach(function(b,idx){
    b.classList.toggle('act',idx===i);
    b.style.color=idx===i?ph.color:'rgba(255,255,255,0.35)';
    if(idx===i){
      b.classList.remove('nb-bounce');
      void b.offsetWidth; // force reflow
      b.classList.add('nb-bounce');
      setTimeout(function(){b.classList.remove('nb-bounce');},450);
    }
  });
  R();
}

function startTimer(secs,label,next){
  if(TMR)clearInterval(TMR.iv);
  TNEXT=next||null;TALERTED=false;
  TMR={secs:secs,rem:secs,label:label,paused:false,iv:null};
  // Schedule notification for when timer ends
  var notifBody=next?('Prochain : '+next):"C'est parti !";
  scheduleNotif(secs, 'JACOBZ - Repos termine', notifBody);
  timerGo();
  buildTimer(); // append to body immediately
}
function timerGo(){
  TMR.iv=setInterval(function(){
    if(!TMR)return;
    TMR.rem--;
    if(!TALERTED&&TMR.rem===10){TALERTED=true;playAlert();vib([100,50,100,50,200]);}
    if(TMR.rem<=0){stopTimer();playDone();vib([300]);safeR();return;}
    tickUI();
  },1000);
}
function stopTimer(){
  if(TMR)clearInterval(TMR.iv);TMR=null;TNEXT=null;TALERTED=false;cancelNotif();
  var te=document.getElementById('timer-overlay');
  if(te)te.parentNode.removeChild(te);
}
function tickUI(){
  if(!TMR)return;
  var bigR=98,bigCI=2*Math.PI*bigR,pct=(TMR.secs-TMR.rem)/TMR.secs;
  var m=Math.floor(TMR.rem/60),s=TMR.rem%60;
  var c=TMR.rem<=10?'#e85e1a':TMR.rem<=30?'#e07c2a':getPhase(ST.week).color;
  var tc=document.getElementById('tcircle'),tb=document.getElementById('tbar');
  var tcd=document.getElementById('tcd'),tcu=document.getElementById('tcu');
  if(tc){tc.setAttribute('stroke-dashoffset',String(bigCI*pct));tc.setAttribute('stroke',c);}
  if(tb){tb.style.width=(pct*100)+'%';tb.style.background=c;}
  if(tcd){tcd.textContent=m>0?(m+':'+(s<10?'0':'')+s):String(s);tcd.style.color=TMR.rem<=10?'#e85e1a':'#fff';}
  if(tcu)tcu.textContent=m>0?'MIN':'SEC';
  if(TMR.rem===10)safeR();
}
function startChrono(){
  clearInterval(CRONIV);
  CRONIV=setInterval(function(){
    var e=document.getElementById('chrono');
    if(e&&T0)e.textContent=fmtTime(Math.floor((Date.now()-T0)/1000));
  },1000);
}

// SET ROW
function buildSetRow(idx,ex,log,sKey,ph,wip,nextName){
  var isBW=!!ex.bwOnly,isBWL=!!ex.bw,isCond=!!ex.cond,isTimed=!!ex.timed;
  var suggested=(!isBW&&!isCond&&ex.baseKg)?calcKg(ex.baseKg,ph.id,wip,ex.incr):0;
  var entry=log||{kg:suggested,reps:ex.reps||8,done:false};
  var ac=isCond?'#64b4ff':isTimed?'#a78bfa':isBW?'#9aeebb':ph.color;
  var wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;gap:4px';
  var hist=lastPerf(ex.id,SESS&&SESS.id,idx,ST.week);
  if(hist&&!isBW&&!isCond){
    wrap.appendChild(div({fontSize:'10px',color:'#555',padding:'1px 12px'},'S'+hist.w+': '+hist.kg+'kg x '+hist.reps));
  }
  function save(ne){
    var k=sKey+'_'+ex.id+'_'+idx;
    var nl=Object.assign({},ST.logs);nl[k]=ne;
    var np=Object.assign({},ST.prs);
    if(ne.done){
      if(!isBW&&!isCond&&ne.kg>0){
        var pr=ST.prs[ex.id];
        if(!pr||ne.kg>pr.kg||(ne.kg===pr.kg&&ne.reps>pr.reps)){
          np[ex.id]={kg:ne.kg,reps:ne.reps,date:new Date().toLocaleDateString('fr-FR')};
          launchConfetti(ph.color);vib([100,50,100,50,200]);
        }
      }else{
        var pr2=ST.prs[ex.id];
        if(!pr2||ne.reps>pr2.reps){
          np[ex.id]={kg:0,reps:ne.reps,date:new Date().toLocaleDateString('fr-FR')};
          launchConfetti(ph.color);vib([100,50,100,50,200]);
        }
      }
      if(!log||!log.done)if(ex.rest>0)startTimer(ex.rest,ex.name,nextName);
    }
    ST=Object.assign({},ST,{logs:nl,prs:np});saveS(ST);safeR();
  }
  var rowBg=entry.done?(isCond?'rgba(100,180,255,.09)':isBW?'rgba(154,238,187,.09)':'rgba(200,164,90,0.1)'):'rgba(255,255,255,0.04)';

  var s=SESS,ph=getPhase(ST.week),sKey=ST.week+'_'+s.id+'_lvl'+RFT_LEVEL;
  var allExos=getExosForSession(s);

  // Group by bloc
  var blocs=[];
  allExos.forEach(function(ex){
    var bi=ex.bloc||0;
    if(!blocs[bi])blocs[bi]=[];
    blocs[bi].push(ex);
  });
  var mainBlocs=blocs.slice(0,4).filter(Boolean);
  var finExos=blocs[3]&&blocs[3][0]&&blocs[3][0].finisher?blocs[3]:[];
  // If bloc 3 is finisher, main blocs are 0,1,2 only
  if(finExos.length>0) mainBlocs=blocs.slice(0,3).filter(Boolean);
  var rounds=3;

  // Calculate state for each bloc
  function getBlocState(b){
    var bl=mainBlocs[b];
    if(!bl) return {curRound:0,done:false};
    for(var r=0;r<rounds;r++){
      var rDone=bl.every(function(ex){var l=ST.logs[sKey+'_'+ex.id+'_'+r];return l&&l.done;});

                  vib([20]);
                  // Stop any existing ex timer
                  if(RFT_EX_TMR){clearInterval(RFT_EX_TMR.iv);RFT_EX_TMR=null;}
                  // Start exercise countdown
                  var totalSecs=exRef.reps;
                  RFT_EX_TMR={exId:exRef.id,round:curRound,sKey:sKey,rem:totalSecs,secs:totalSecs,iv:null};
                  RFT_EX_TMR.iv=setInterval(function(){
                    if(!RFT_EX_TMR)return;
                    RFT_EX_TMR.rem--;
                    // Alert at 10s
                    if(RFT_EX_TMR.rem===10){playAlert();vib([100,50,100]);}
                    // Update inline display
                    var tEl=document.getElementById('rft-ex-t-'+exRef.id);

                      clearInterval(RFT_EX_TMR.iv);RFT_EX_TMR=null;
                      playDone();vib([200,50,200]);
                      var nl=Object.assign({},ST.logs);
                      nl[lkRef]={done:true,reps:exRef.reps};
                      ST=Object.assign({},ST,{logs:nl});saveS(ST);
                      // Start rest timer
                      var isLastEx=iRef===bl.length-1;
                      var isLastRound=curRound===rounds-1;
                      var restSecs=isLastEx?(isLastRound?0:30):10;
                      var nextLabel=isLastEx?(isLastRound?'Bloc suivant':'Repos inter-rounds'):'Suivant: '+bl[iRef+1].name;
                      var nextName=isLastEx?(isLastRound?(mainBlocs[biRef+1]?'BLOC '+(biRef+2):'Finisher'):'Round '+(curRound+2)):bl[iRef+1].name;
                      if(restSecs>0)startTimer(restSecs,nextLabel,nextName);
                      safeR();
                    }
                  },1000);
                  safeR();
                });
              })(ex,lkCurr,i,bi);
              topRow.appendChild(startBtn);
            }else{
              // Done checkmark
              var doneEl=div({width:'52px',height:'34px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',color:ac,flexShrink:'0'});
              doneEl.innerHTML='&#10003;';

            doneEl2.innerHTML='&#10003;';
            topRow.appendChild(doneEl2);
          }

          exCard.appendChild(topRow);

          // Progress bar (shown while timing)
          if(isTimingThis){
            var pbWrap=div({height:'3px',background:'#1e1e1e',borderRadius:'2px',overflow:'hidden'});
            var pbFill=div({height:'100%',background:ac,
              width:Math.round((1-RFT_EX_TMR.rem/RFT_EX_TMR.secs)*100)+'%',

            pbFill.id='rft-ex-pb-'+ex.id;
            pbWrap.appendChild(pbFill);
            exCard.appendChild(pbWrap);
          }

          exList.appendChild(exCard);
        });
        blocCard.appendChild(exList);
      }
      content.appendChild(blocCard);
    });

    // FINISHER
    if(allBlocsDone&&finExos.length>0){
      content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'10px',color:'#e85e1a',letterSpacing:'4px',marginBottom:'8px'},'FINISHER'));
      finExos.forEach(function(ex){
        var lk=sKey+'_'+ex.id+'_0';
        var log=ST.logs[lk];
        var done=!!(log&&log.done);
        var card=div({background:done?'rgba(232,94,26,.07)':'#0f0f0f',
          border:'1px solid '+(done?'#e85e1a40':'#1e1e1e'),
          borderRadius:'12px',padding:'14px 16px',
          display:'flex',alignItems:'center',gap:'12px'});
        card.appendChild(div({width:'36px',height:'36px',borderRadius:'10px',
          background:done?'#e85e1a':'#1e1e1e',flexShrink:'0',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:'11px',color:done?'#000':'#e85e1a',
          fontFamily:'Bebas Neue,cursive',border:'1px solid '+(done?'#e85e1a':'#2a2a2a')},
          'FIN'));
        var info=div({flex:'1'});
        info.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'17px',color:'#e85e1a',letterSpacing:'1px'},ex.name));
        info.appendChild(div({fontSize:'11px',color:'#555',marginTop:'2px'},ex.reps+'s - Finisher'));
        card.appendChild(info);
        var db=document.createElement('button');db.innerHTML='&#10003;';
        Object.assign(db.style,{width:'40px',height:'34px',borderRadius:'8px',cursor:'pointer',flexShrink:'0',
          background:done?'#e85e1a':'#1a1a1a',border:'2px solid '+(done?'#e85e1a':'#2a2a2a'),
          color:done?'#000':'#333',fontSize:'14px',fontWeight:'700',
          display:'flex',alignItems:'center',justifyContent:'center'});
        (function(lkRef,doneRef){
          db.addEventListener('click',function(){
            vib([20]);
            var nl=Object.assign({},ST.logs);nl[lkRef]={done:!doneRef,reps:ex.reps};
            ST=Object.assign({},ST,{logs:nl});saveS(ST);stopTimer();safeR();
          });
        })(lk,done);
        card.appendChild(db);
        content.appendChild(card);
      });
    }else if(!allBlocsDone&&finExos.length>0){
      // Show finisher locked
      var lockedFin=div({background:'#0a0a0a',border:'1px solid #181818',borderRadius:'12px',padding:'14px 16px',display:'flex',alignItems:'center',gap:'10px',opacity:'0.4'});
      lockedFin.innerHTML='<div style="font-family:Bebas Neue,cursive;font-size:13px;color:#444;letter-spacing:2px">FINISHER - '+finExos[0].name+' - '+finExos[0].reps+'s</div>';
      content.appendChild(lockedFin);
    }
    root.appendChild(content);
  }

  if(T0&&!allDone)startChrono();
  return root;
}

  var items=[
    {icon:'&#9654;',label:'Commencer',action:function(){
      SESS=sess;wuChecks={};OPEN=null;SUBVIEW='warmup';ANIM='fwd';safeR();

    }},
    {icon:'&#10003;',label:'Marquer cette semaine',action:function(){

      exos.forEach(function(ex){

      });
      ST=Object.assign({},ST,{logs:nl});saveS(ST);safeR();
    }}
  ];

  items.forEach(function(it){
    var item=document.createElement('button');
    item.className='ctx-item';
    item.innerHTML='<span class="ctx-icon">'+it.icon+'</span>'+it.label;

  vib([8,50,8]);

// BOTTOM SHEET for exercise details
function openBottomSheet(ex,sKey,ph,wip,nextName,noAnim){
  SHEET_STATE={ex:ex,sKey:sKey,ph:ph,wip:wip,nextName:nextName};

  // If sheet already exists, just update content in-place (no animation, no drag reset)
  var existingOverlay=document.getElementById('bs-overlay');
  var existingContent=document.getElementById('bs-body');
  if(existingOverlay&&existingContent&&noAnim){
    existingContent.innerHTML='';
    buildSheetBody(ex,sKey,ph,wip,nextName,existingContent);
    return;
  }

  // Remove old sheet if any
  if(existingOverlay)existingOverlay.parentNode.removeChild(existingOverlay);

  var overlay=document.createElement('div');
  overlay.className='bs-overlay';overlay.id='bs-overlay';
  overlay.style.background='rgba(0,0,0,0.5)';

  var sheet=document.createElement('div');
  sheet.className='bs-sheet';

  // Fixed header — drag zone LARGE
  var bsHeader=document.createElement('div');
  bsHeader.className='bs-header';
  bsHeader.style.cssText='flex-shrink:0;touch-action:none;-webkit-user-select:none;user-select:none;cursor:grab;padding:0;width:100%;height:44px;display:flex;justify-content:center;align-items:center;position:relative;';
  var pill=document.createElement('div');
  pill.style.cssText='width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.25);pointer-events:none;margin-top:12px;position:absolute;top:0;';
  bsHeader.appendChild(pill);
  sheet.appendChild(bsHeader);

  // Scrollable content
  var bsContent=document.createElement('div');
  bsContent.className='bs-content';
  bsContent.id='bs-body';
  buildSheetBody(ex,sKey,ph,wip,nextName,bsContent);
  sheet.appendChild(bsContent);

  // DISMISS
  function dismissSheet(){
    SHEET_STATE=null;OPEN=null;
    sheet.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
    sheet.style.transform='translateY(106%)';
    overlay.style.transition='opacity .28s ease';
    overlay.style.opacity='0';
    setTimeout(function(){if(overlay.parentNode)overlay.parentNode.removeChild(overlay);},320);
  }

  // DRAG — on full sheet, only when content is scrolled to top
  var _y0=0,_dy=0,_active=false,_raf=null;

  sheet.addEventListener('touchstart',function(e){
    _y0=e.touches[0].clientY;_dy=0;_active=false;
  },{passive:true});

  sheet.addEventListener('touchmove',function(e){
    var dy=e.touches[0].clientY-_y0;
    // Only drag if swiping down AND content is at top
    if(dy>0&&bsContent.scrollTop<=0){
      if(!_active){
        _active=true;
        sheet.style.transition='none';
      }
      _dy=dy;
      if(_raf)cancelAnimationFrame(_raf);
      _raf=requestAnimationFrame(function(){
        sheet.style.transform='translateY('+_dy+'px)';
        overlay.style.opacity=String(Math.max(0,0.5-_dy/350));
      });
    }
  },{passive:true});

  sheet.addEventListener('touchend',function(){
    if(!_active){_dy=0;return;}
    _active=false;
    if(_raf){cancelAnimationFrame(_raf);_raf=null;}
    if(_dy>80){
      dismissSheet();
    }else{
      sheet.style.transition='transform .4s cubic-bezier(.34,1.4,.64,1)';
      sheet.style.transform='translateY(0)';
      overlay.style.transition='opacity .25s';
      overlay.style.opacity='0.5';
      _dy=0;
    }
  },{passive:true});

  sheet.addEventListener('touchcancel',function(){
    _active=false;_dy=0;
    sheet.style.transition='transform .32s ease';
    sheet.style.transform='translateY(0)';
  },{passive:true});

  overlay.addEventListener('click',function(e){
    if(e.target===overlay)dismissSheet();
  });

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}

// SMART HELPERS
function progressionVsPast(exId,weeksAgo){
  // Returns {curr, past, deltaPct} - comparing best 1RM in a window
  var curr=best1RMUntil(exId,ST.week);
  var past=best1RMUntil(exId,Math.max(1,ST.week-weeksAgo));
  if(!curr||!past)return null;
  return {curr:curr,past:past,deltaPct:Math.round(((curr-past)/past)*100)};
}
function best1RMUntil(exId,maxWeek){
  var best=0;
  Object.keys(ST.logs).forEach(function(k){
    if(k.indexOf('_'+exId+'_')<0)return;
    var w=parseInt(k.split('_')[0]);
    if(w>maxWeek)return;
    var l=ST.logs[k];
    if(l&&l.done&&l.kg>0){var r=rm1(l.kg,l.reps);if(r>best)best=r;}
  });
  return best;
}
function lastSessionDate(sessId){
  // Latest date a session was logged
  var latest=null;
  Object.keys(ST.logs).forEach(function(k){
    var parts=k.split('_');
    if(parts[1]===sessId&&ST.logs[k]&&ST.logs[k].done){
      var w=parseInt(parts[0]);
      if(!latest||w>latest)latest=w;
    }
  });
  return latest;
}
function daysSinceSession(sessId){
  // Approximate: based on completedDates closest to last log
  var latestWeek=lastSessionDate(sessId);
  if(!latestWeek)return null;
  // Use most recent training date in completedDates
  var dates=(ST.dates||[]).slice().sort();
  if(!dates.length)return null;
  var lastDate=new Date(dates[dates.length-1]);
  var days=Math.floor((Date.now()-lastDate.getTime())/(24*3600*1000));
  return days;
}
function recommendKg(ex,sessId){
  // If we have last 2 sessions data, recommend slight progression
  var pastLogs=[];
  for(var w=ST.week-1;w>=Math.max(1,ST.week-3);w--){
    for(var i=0;i<ex.sets;i++){
      var l=ST.logs[w+'_'+sessId+'_'+ex.id+'_'+i];
      if(l&&l.done&&l.kg>0)pastLogs.push({w:w,kg:l.kg,reps:l.reps});
    }
  }
  if(pastLogs.length<2)return null;
  // Average of last completed sets
  var avgKg=pastLogs.reduce(function(a,b){return a+b.kg;},0)/pastLogs.length;
  // If all hit target reps, suggest +2.5kg, else maintain
  var allHit=pastLogs.every(function(p){return p.reps>=ex.reps;});
  return allHit?Math.round((avgKg+2.5)*2)/2:Math.round(avgKg*2)/2;
}
function getSmartAlerts(){
  var alerts=[];
  // 1. Sessions not done in 7+ days
  SESSIONS.forEach(function(s){
    var lastW=lastSessionDate(s.id);
    if(!lastW)return;
    var weeksSince=ST.week-lastW;
    if(weeksSince>=2)alerts.push({type:'warn',icon:'!',msg:'Tu n\'as pas fait '+s.name+' depuis '+weeksSince+' semaines'});
  });
  // 2. PRs this week
  var thisWeekPRs=0;
  Object.keys(ST.prs).forEach(function(k){
    var pr=ST.prs[k];
    if(!pr.date)return;
    var parts=pr.date.split('/');
    if(parts.length!==3)return;
    var prDate=new Date(parts[2],parts[1]-1,parts[0]);
    var diff=(Date.now()-prDate.getTime())/(24*3600*1000);
    if(diff<=7)thisWeekPRs++;
  });
  if(thisWeekPRs>0)alerts.push({type:'good',icon:'+',msg:thisWeekPRs+' record(s) battu(s) cette semaine'});
  // 3. Streak milestone
  var s=calcStreak();
  if(s>=5)alerts.push({type:'good',icon:'*',msg:'Streak de '+s+' jours - constance exemplaire'});
  // 4. Progression on key lifts vs 4 weeks ago
  var keyLifts=[{id:'p1bp',n:'Bench'},{id:'l1sq',n:'Squat'},{id:'q1dl',n:'Deadlift'},{id:'p1ohp',n:'OHP'}];
  keyLifts.forEach(function(kl){
    var p=progressionVsPast(kl.id,4);
    if(p&&p.deltaPct>=8)alerts.push({type:'good',icon:'+',msg:kl.n+': +'+p.deltaPct+'% vs S-4 ('+p.past+'kg -> '+p.curr+'kg)'});
    else if(p&&p.deltaPct<=-5)alerts.push({type:'warn',icon:'-',msg:kl.n+': -'+Math.abs(p.deltaPct)+'% vs S-4'});
  });
  return alerts;
}

// SMART NOTIFICATIONS
function getSmartNotif(){
  var now=Date.now();
  var dates=ST.dates||[];
  var sortedDates=dates.slice().sort().reverse();
  var lastDate=sortedDates.length?new Date(sortedDates[0]).getTime():0;
  var daysSince=lastDate?Math.floor((now-lastDate)/(24*3600*1000)):999;
  var today=new Date().toISOString().split('T')[0];
  var trainedToday=sortedDates.indexOf(today)>=0;
  var strk=calcStreak();
  var recov=getMuscleRecovery();

  // Priority 1: streak at risk
  if(strk>0&&!trainedToday&&new Date().getHours()>=17){
    return{type:'warn',msg:'Ton streak de '+strk+' jours se termine ce soir !',sub:'Une seance suffit pour le garder',icon:'!'};
  }
  // Priority 2: long absence
  if(daysSince>=3&&!trainedToday){
    // Find best session based on recovery
    var bestMus='chest';var bestVal=0;
    Object.keys(recov).forEach(function(m){if(recov[m]>bestVal){bestVal=recov[m];bestMus=m;}});
    var musToSess={chest:'PUSH',back:'PULL',quads:'LEGS',shoulders:'PUSH',biceps:'PULL',hamstrings:'LEGS',glutes:'LEGS',triceps:'PUSH',core:'COND',calves:'LEGS'};
    var suggested=musToSess[bestMus]||'PUSH';
    return{type:'info',msg:daysSince+' jours sans seance',sub:'Tes muscles sont recuperes - '+suggested+' recommande aujourd\'hui',icon:'*'};
  }
  // Priority 3: muscles ready
  if(!trainedToday){
    var fullRecov=Object.keys(recov).filter(function(m){return recov[m]>=0.95;});
    if(fullRecov.length>=3){
      return{type:'good',msg:fullRecov.length+' groupes musculaires a 100%',sub:'Tu es frais et dispo pour une bonne seance',icon:'+'};
    }
  }
  // Priority 4: PRs this week
  var weekPRs=0;
  Object.keys(ST.prs).forEach(function(k){
    var pr=ST.prs[k];if(!pr.date)return;
    var parts=pr.date.split('/');if(parts.length!==3)return;
    var d=new Date(parts[2],parts[1]-1,parts[0]);
    if(now-d.getTime()<7*24*3600*1000)weekPRs++;
  });
  if(weekPRs>0&&trainedToday){
    return{type:'good',msg:weekPRs+' record'+(weekPRs>1?'s':'')+' battu'+(weekPRs>1?'s':'')+' cette semaine',sub:'Excellente progression. Continue comme ca.',icon:'+'};
  }
  // Priority 5: phase change
  var wip=getWIP(ST.week);
  if(wip===1&&ST.week>1){
    var ph2=getPhase(ST.week);
    return{type:'info',msg:'Nouvelle phase : '+ph2.name,sub:ph2.sub+' - Les exercices evoluent cette semaine',icon:'i'};
  }
  return null;
}

// Animated counter - counts from 0 to target
function animateCounter(el, target, duration, suffix){
  suffix=suffix||'';
  var start=0,startTime=null;
  var isFloat=String(target).indexOf('.')>=0;
  function step(ts){
    if(!startTime)startTime=ts;
    var progress=Math.min((ts-startTime)/duration,1);
    // Ease out cubic
    var ease=1-Math.pow(1-progress,3);
    var current=Math.round(ease*target*10)/10;
    el.textContent=(isFloat?current.toFixed(1):Math.round(current))+suffix;
    if(progress<1)requestAnimationFrame(step);
    else el.textContent=target+suffix;
  }
  requestAnimationFrame(step);
}

// ANALYSE
function buildAnalyse(){
  var ph=getPhase(ST.week);
  var root=div({minHeight:'100vh',background:'#060606',paddingBottom:'80px'});
  var hero=div({background:'linear-gradient(165deg,rgba(16,12,3,0.95),rgba(6,6,6,0.9))',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderBottom:'1px solid rgba(255,255,255,0.07)',padding:'28px 20px 22px'});
  hero.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'32px',letterSpacing:'5px',color:ph.color,lineHeight:'1'},'ANALYSE'));
  hero.appendChild(div({fontSize:'11px',color:'rgba(255,255,255,0.3)',letterSpacing:'2px',marginTop:'4px'},'Corps & Equilibre musculaire'));
  root.appendChild(hero);
  var content=div({padding:'16px 16px'});

  // RADAR MUSCULAIRE
  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'14px'},'EQUILIBRE MUSCULAIRE'));
  var radarBox=div({background:'rgba(255,255,255,0.04)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',border:'1px solid rgba(255,255,255,0.09)',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.12)',borderRadius:'20px',padding:'16px',marginBottom:'16px'});

  // Get muscle load data
  var load=getMuscleLoad();
  var muscles=[
    {k:'chest',n:'Pecto',angle:-90},
    {k:'back',n:'Dos',angle:-45},
    {k:'shoulders',n:'Epaules',angle:0},
    {k:'biceps',n:'Biceps',angle:45},
    {k:'quads',n:'Quadri',angle:90},
    {k:'hamstrings',n:'Ischio',angle:135},
    {k:'core',n:'Core',angle:180},
    {k:'triceps',n:'Triceps',angle:-135}
  ];

  var svgNS='http://www.w3.org/2000/svg';
  var radar=document.createElementNS(svgNS,'svg');
  radar.setAttribute('width','100%');radar.setAttribute('viewBox','0 0 300 300');
  var cx=150,cy=150,maxR=100;

  // Grid
  [25,50,75,100].forEach(function(r){
    var c=document.createElementNS(svgNS,'circle');
    c.setAttribute('cx',String(cx));c.setAttribute('cy',String(cy));c.setAttribute('r',String(r));
    c.setAttribute('fill','none');c.setAttribute('stroke','rgba(255,255,255,0.06)');c.setAttribute('stroke-width','0.5');
    radar.appendChild(c);
  });

  // Axis lines
  muscles.forEach(function(m){
    var rad=m.angle*Math.PI/180;
    var line=document.createElementNS(svgNS,'line');
    line.setAttribute('x1',String(cx));line.setAttribute('y1',String(cy));
    line.setAttribute('x2',String(cx+maxR*Math.cos(rad)));line.setAttribute('y2',String(cy+maxR*Math.sin(rad)));
    line.setAttribute('stroke','rgba(255,255,255,0.06)');line.setAttribute('stroke-width','0.5');
    radar.appendChild(line);
  });

  // Data polygon
  var pts=muscles.map(function(m){
    var val=load[m.k]||0;
    var rad=m.angle*Math.PI/180;
    return (cx+val*maxR*Math.cos(rad))+','+(cy+val*maxR*Math.sin(rad));
  }).join(' ');
  var poly=document.createElementNS(svgNS,'polygon');
  poly.setAttribute('points',pts);
  poly.setAttribute('fill',ph.color);poly.setAttribute('fill-opacity','0.18');
  poly.setAttribute('stroke',ph.color);poly.setAttribute('stroke-width','1.5');
  radar.appendChild(poly);

  // Dots + labels
  muscles.forEach(function(m){
    var val=load[m.k]||0;
    var rad=m.angle*Math.PI/180;
    var dotX=cx+val*maxR*Math.cos(rad);var dotY=cy+val*maxR*Math.sin(rad);
    var dot=document.createElementNS(svgNS,'circle');
    dot.setAttribute('cx',String(dotX));dot.setAttribute('cy',String(dotY));dot.setAttribute('r','4');
    dot.setAttribute('fill',val<0.3?'#e85e1a':ph.color);
    radar.appendChild(dot);
    // Label
    var lblR=maxR+18;var lblX=cx+lblR*Math.cos(rad);var lblY=cy+lblR*Math.sin(rad);
    var txt=document.createElementNS(svgNS,'text');
    txt.setAttribute('x',String(lblX));txt.setAttribute('y',String(lblY+4));
    txt.setAttribute('text-anchor','middle');txt.setAttribute('font-family','system-ui');
    txt.setAttribute('font-size','9');txt.setAttribute('fill',val<0.3?'#e85e1a':'rgba(255,255,255,0.6)');
    txt.textContent=m.n;radar.appendChild(txt);
    // % value
    if(val>0){
      var pTxt=document.createElementNS(svgNS,'text');
      pTxt.setAttribute('x',String(lblX));pTxt.setAttribute('y',String(lblY+14));
      pTxt.setAttribute('text-anchor','middle');pTxt.setAttribute('font-family','Bebas Neue,cursive');
      pTxt.setAttribute('font-size','9');pTxt.setAttribute('fill',val<0.3?'#e85e1a':ph.color);
      pTxt.textContent=Math.round(val*100)+'%';radar.appendChild(pTxt);
    }
  });

  radarBox.appendChild(radar);

  // Alert if imbalance
  var weak=muscles.filter(function(m){return (load[m.k]||0)<0.3;});
  if(weak.length>0){
    var alert=div({display:'flex',alignItems:'center',gap:'10px',marginTop:'10px',padding:'10px 12px',background:'rgba(232,94,26,0.08)',border:'1px solid rgba(232,94,26,0.25)',borderRadius:'10px'});
    alert.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'14px',color:'#e85e1a',flexShrink:'0'},'!'));
    var alertTxt=div({flex:'1'});
    alertTxt.appendChild(div({fontSize:'11px',color:'#e07c2a',fontWeight:'600'},weak.map(function(m){return m.n;}).join(', ')+' sous-travailles'));
    alertTxt.appendChild(div({fontSize:'10px',color:'#555',marginTop:'2px'},'Ajoute une seance pour equilibrer'));
    alert.appendChild(alertTxt);
    radarBox.appendChild(alert);
  }
  content.appendChild(radarBox);

  // ACTIVITY RINGS (moved from Stats)
  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'14px'},'ACTIVITE HEBDOMADAIRE'));
  var ringsBox=div({background:'rgba(255,255,255,0.04)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',border:'1px solid rgba(255,255,255,0.09)',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.12)',borderRadius:'20px',padding:'20px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'20px'});
  var seancesDone=0;
  SESSIONS.forEach(function(s){var st=sesStats(s);if(st.done===st.total&&st.total>0)seancesDone++;});
  var seancesTotal=6;
  var seancesPct=Math.min(1,seancesDone/seancesTotal);
  var strk=calcStreak();
  var strkPct=Math.min(1,strk/7);
  var volLoad=getMuscleLoad();
  var volTotal=0;Object.keys(volLoad).forEach(function(k){volTotal+=volLoad[k];});
  var volPct=Math.min(1,volTotal/5);
  var rings=[
    {pct:seancesPct,color:ph.color,label:'SEANCES',value:seancesDone+'/'+seancesTotal},
    {pct:volPct,color:'#e07c2a',label:'VOLUME',value:Math.round(volPct*100)+'%'},
    {pct:strkPct,color:'#e85e1a',label:'STREAK',value:strk+'j'}
  ];
  var svgEl=document.createElementNS(svgNS,'svg');
  svgEl.setAttribute('width','150');svgEl.setAttribute('height','150');svgEl.setAttribute('viewBox','0 0 150 150');
  var radii=[62,46,30];
  rings.forEach(function(r,i){
    var rad=radii[i];var circ=2*Math.PI*rad;var offset=circ*(1-r.pct);
    var track=document.createElementNS(svgNS,'circle');
    track.setAttribute('cx','75');track.setAttribute('cy','75');track.setAttribute('r',String(rad));
    track.setAttribute('fill','none');track.setAttribute('stroke',r.color);track.setAttribute('stroke-opacity','0.15');track.setAttribute('stroke-width','13');
    svgEl.appendChild(track);
    var prog=document.createElementNS(svgNS,'circle');
    prog.setAttribute('cx','75');prog.setAttribute('cy','75');prog.setAttribute('r',String(rad));
    prog.setAttribute('fill','none');prog.setAttribute('stroke',r.color);prog.setAttribute('stroke-width','13');
    prog.setAttribute('stroke-dasharray',String(circ));prog.setAttribute('stroke-dashoffset',String(circ));
    prog.setAttribute('stroke-linecap','round');prog.setAttribute('transform','rotate(-90 75 75)');
    prog.style.transition='stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1) '+(i*200)+'ms';
    svgEl.appendChild(prog);
    setTimeout(function(){prog.setAttribute('stroke-dashoffset',String(offset));},50+i*200);
    if(r.pct>0.02){
      var angle=(-90+r.pct*360)*Math.PI/180;
      var cx2=75+rad*Math.cos(angle);var cy2=75+rad*Math.sin(angle);
      var cap=document.createElementNS(svgNS,'circle');
      cap.setAttribute('cx',String(cx2));cap.setAttribute('cy',String(cy2));cap.setAttribute('r','6.5');
      cap.setAttribute('fill',r.color);cap.style.opacity='0';
      cap.style.transition='opacity .3s '+(0.8+i*0.2)+'s';
      svgEl.appendChild(cap);
      setTimeout(function(){cap.style.opacity='0.95';},800+i*200);
    }
  });
  var cTxt=document.createElementNS(svgNS,'text');
  cTxt.setAttribute('x','75');cTxt.setAttribute('y','70');cTxt.setAttribute('text-anchor','middle');
  cTxt.setAttribute('font-family','Bebas Neue,cursive');cTxt.setAttribute('font-size','22');cTxt.setAttribute('fill','#fff');
  cTxt.textContent=seancesDone+'/'+seancesTotal;svgEl.appendChild(cTxt);
  var cLbl=document.createElementNS(svgNS,'text');
  cLbl.setAttribute('x','75');cLbl.setAttribute('y','86');cLbl.setAttribute('text-anchor','middle');
  cLbl.setAttribute('font-family','system-ui');cLbl.setAttribute('font-size','9');cLbl.setAttribute('fill','#666');cLbl.setAttribute('letter-spacing','2');
  cLbl.textContent='SEANCES';svgEl.appendChild(cLbl);
  ringsBox.appendChild(svgEl);
  var legend=div({flex:'1',display:'flex',flexDirection:'column',gap:'14px'});
  rings.forEach(function(r){
    var row=div({display:'flex',alignItems:'center',gap:'10px'});
    var dot=div({width:'10px',height:'10px',borderRadius:'50%',background:r.color,flexShrink:'0'});
    var info=div({flex:'1'});
    info.appendChild(div({fontSize:'9px',color:'#555',letterSpacing:'2px',fontFamily:'Bebas Neue,cursive'},r.label));
    info.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'20px',color:r.color,lineHeight:'1.1',letterSpacing:'1px'},r.value));
    row.appendChild(dot);row.appendChild(info);legend.appendChild(row);
  });
  ringsBox.appendChild(legend);
  content.appendChild(ringsBox);

  root.appendChild(content);
  return root;
}

  var hero=div({background:'linear-gradient(175deg,#100c03,#080808)',borderBottom:'1px solid '+ph.color+'20',padding:'28px 20px 22px'});
  hero.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'32px',letterSpacing:'5px',color:ph.color,lineHeight:'1'},'AGENDA'));
  root.appendChild(hero);
  var content=div({padding:'20px 16px'});
  var dates={};(ST.dates||[]).forEach(function(d){dates[d]=true;});

  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'12px'},'30 DERNIERS JOURS'));
  var dots=div({display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'24px'});
  for(var i=29;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var str=d.toISOString().split('T')[0];
    var trained=!!dates[str];
    dots.appendChild(div({width:'24px',height:'24px',borderRadius:'6px',background:trained?ph.color:'#1a1a1a',border:'1px solid '+(trained?ph.color+'80':'#222')}));
  }
  content.appendChild(dots);

  content.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'11px',color:'#555',letterSpacing:'4px',marginBottom:'12px'},'PROGRAMME 16 SEMAINES'));
  for(var ww=1;ww<=16;ww++){
    (function(week){
      var p2=getPhase(week),wip2=p2.weeks.indexOf(week)+1;
      var isCurr=week===ST.week,isPast=week<ST.week;
      var row=div({display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',background:isCurr?p2.dim:'#0f0f0f',border:'1px solid '+(isCurr?p2.color+'60':'#181818'),borderRadius:'10px',marginBottom:'6px'});
      row.appendChild(div({width:'36px',height:'36px',borderRadius:'8px',flexShrink:'0',background:isCurr?p2.color:isPast?p2.color+'20':'#1a1a1a',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Bebas Neue,cursive',fontSize:'16px',color:isCurr?'#000':isPast?p2.color+'80':'#444'},String(week)));
      var ri=div({flex:'1'});
      ri.innerHTML='<div style="font-family:Bebas Neue,cursive;font-size:14px;color:'+(isCurr?p2.color:isPast?'#555':'#444')+';letter-spacing:2px">'+p2.name+' S'+wip2+'/4</div><div style="font-size:10px;color:#444;margin-top:2px">'+p2.sub+'</div>';
      row.appendChild(ri);
      if(isCurr){var en=document.createElement('span');en.textContent='EN COURS';Object.assign(en.style,{fontSize:'9px',color:p2.color,border:'1px solid '+p2.color+'50',borderRadius:'4px',padding:'2px 6px',letterSpacing:'2px',fontFamily:'Bebas Neue,cursive'});row.appendChild(en);}
      content.appendChild(row);
    })(ww);
  }
  root.appendChild(content);
  return root;
}

// Update ambient orbs color for theme + apply tinted glass per phase
(function(){
  var ph=getPhase(ST.week);
  var themeC=THEME==='rose'?'255,160,192':THEME==='silver'?'176,184,200':'200,164,90';
  // Parse phase color to RGB for tint
  var pc=ph.color;
  var r=parseInt(pc.slice(1,3),16),g=parseInt(pc.slice(3,5),16),b=parseInt(pc.slice(5,7),16);
  var s=document.createElement('style');
  s.id='tint-style';
  s.textContent=[
    'body{background:rgb('+Math.round(r*.04)+','+Math.round(g*.03)+','+Math.round(b*.02)+') !important}',
    'body::before{background:radial-gradient(circle,rgba('+r+','+g+','+b+',0.11) 0%,transparent 65%)!important}',
    'body::after{background:radial-gradient(circle,rgba('+r+','+g+','+b+',0.07) 0%,transparent 65%)!important}'
  ].join('');
  document.head.appendChild(s);
})();
// ONBOARDING
function buildOnboarding(){
  var step=0;
  var data={poids:80,bench:100,squat:125,deadlift:145,ohp:65,curl:50};
  var ph=getPhase(1);

  function render(){
    var existing=document.getElementById('onboarding');
    if(existing)existing.parentNode.removeChild(existing);
    var ov=document.createElement('div');
    ov.id='onboarding';
    Object.assign(ov.style,{position:'fixed',inset:'0',zIndex:'9999',background:'rgba(6,6,6,0.98)',backdropFilter:'blur(40px)',WebkitBackdropFilter:'blur(40px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',animation:'springPop .4s cubic-bezier(.25,.46,.45,.94) both'});

    // Header
    var hd=div({textAlign:'center',marginBottom:'32px'});
    hd.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'42px',letterSpacing:'6px',color:ph.color,lineHeight:'1'},'JACOBZ'));
    hd.appendChild(div({fontSize:'11px',color:'#555',letterSpacing:'3px',marginTop:'6px'},'CONFIGURATION · '+(step+1)+' / 3'));
    // Progress bar
    var pb=div({height:'2px',background:'rgba(255,255,255,0.08)',borderRadius:'2px',marginTop:'16px',overflow:'hidden'});
    pb.appendChild(div({height:'100%',width:(((step+1)/3)*100)+'%',background:ph.color,borderRadius:'2px',transition:'width .4s cubic-bezier(.25,.46,.45,.94)'}));
    hd.appendChild(pb);
    ov.appendChild(hd);

    var card=div({background:'rgba(255,255,255,0.05)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',border:'1px solid rgba(255,255,255,0.1)',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.18)',borderRadius:'24px',padding:'28px 24px',width:'100%',maxWidth:'340px',boxSizing:'border-box'});

    if(step===0){
      // Step 1: poids
      card.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'28px',color:'#fff',letterSpacing:'2px',marginBottom:'4px'},'Ton poids'));
      card.appendChild(div({fontSize:'12px',color:'#555',marginBottom:'24px'},'Pour calibrer les charges recommandees'));
      var numDisplay=div({textAlign:'center',marginBottom:'20px'});
      var bigNum=div({fontFamily:'Bebas Neue,cursive',fontSize:'72px',color:ph.color,lineHeight:'1',letterSpacing:'2px'},String(data.poids));
      numDisplay.appendChild(bigNum);
      numDisplay.appendChild(div({fontSize:'11px',color:'#555',letterSpacing:'3px'},'KG'));
      card.appendChild(numDisplay);
      var slider=document.createElement('input');
      slider.type='range';slider.min='50';slider.max='150';slider.value=String(data.poids);slider.step='1';
      Object.assign(slider.style,{width:'100%',accentColor:ph.color,marginBottom:'8px'});
      slider.addEventListener('input',function(){data.poids=parseInt(slider.value);bigNum.textContent=slider.value;});
      card.appendChild(slider);
      var marks=div({display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#444'});
      marks.appendChild(div({},'50kg'));marks.appendChild(div({},'100kg'));marks.appendChild(div({},'150kg'));
      card.appendChild(marks);

    }else if(step===1){
      // Step 2: lifts
      card.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'28px',color:'#fff',letterSpacing:'2px',marginBottom:'4px'},'Tes lifts actuels'));
      card.appendChild(div({fontSize:'12px',color:'#555',marginBottom:'20px'},'Estimation 1RM ou meilleure serie'));
      var grid=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'});
      [['bench','Bench Press'],['squat','Squat'],['deadlift','Deadlift'],['ohp','OHP'],['curl','Curl'],['ohp','Poids']].forEach(function(pair,i){
        if(i>4)return;
        var k=pair[0],n=pair[1];
        var block=div({background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'12px',padding:'12px',textAlign:'center'});
        block.appendChild(div({fontSize:'9px',color:'#555',letterSpacing:'2px',fontFamily:'Bebas Neue,cursive',marginBottom:'6px'},n));
        var row=div({display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'});
        var mBtn=document.createElement('button');mBtn.textContent='-';
        Object.assign(mBtn.style,{width:'28px',height:'28px',borderRadius:'7px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'#888',fontSize:'14px',cursor:'pointer',touchAction:'manipulation'});
        var valEl=div({fontFamily:'Bebas Neue,cursive',fontSize:'20px',color:ph.color,minWidth:'48px',textAlign:'center'},data[k]+'kg');
        var pBtn=document.createElement('button');pBtn.textContent='+';
        Object.assign(pBtn.style,{width:'28px',height:'28px',borderRadius:'7px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'#888',fontSize:'14px',cursor:'pointer',touchAction:'manipulation'});
        (function(key,el){
          mBtn.addEventListener('click',function(){data[key]=Math.max(20,data[key]-2.5);el.textContent=data[key]+'kg';});
          pBtn.addEventListener('click',function(){data[key]=Math.min(300,data[key]+2.5);el.textContent=data[key]+'kg';});
        })(k,valEl);
        row.appendChild(mBtn);row.appendChild(valEl);row.appendChild(pBtn);
        block.appendChild(row);grid.appendChild(block);
      });
      card.appendChild(grid);

    }else{
      // Step 3: programme
      card.appendChild(div({fontFamily:'Bebas Neue,cursive',fontSize:'28px',color:'#fff',letterSpacing:'2px',marginBottom:'4px'},'Ton programme'));
      card.appendChild(div({fontSize:'12px',color:'#555',marginBottom:'20px'},'Tu pourras en changer depuis l\'accueil'));
      var progs=[{k:'THOR',l:'THOR x ANATOLY',desc:'Force + Hypertrophie · 16 semaines'},{k:'STREET',l:'STREET WORKOUT',desc:'Calisthenics · Progressif'},{k:'RFT',l:'RFT DA RULK',desc:'Conditioning · 3 niveaux'}];
      var chosen='THOR';
      var progBtns=[];
      progs.forEach(function(p){
        var b=document.createElement('button');
        b.style.cssText='display:block;width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#fff;text-align:left;cursor:pointer;margin-bottom:8px;touch-action:manipulation';
        b.innerHTML='<div style="font-family:Bebas Neue,cursive;font-size:16px;letter-spacing:2px;color:'+(p.k==='THOR'?ph.color:'#888')+'">'+p.l+'</div><div style="font-size:10px;color:#555;margin-top:2px">'+p.desc+'</div>';
        if(p.k==='THOR')b.style.border='1px solid '+ph.color+'60';
        b.addEventListener('click',function(){
          chosen=p.k;
          progBtns.forEach(function(pb,i){
            pb.style.border='1px solid rgba(255,255,255,0.1)';pb.style.background='rgba(255,255,255,0.04)';
            pb.querySelector('div').style.color='#888';
          });
          b.style.border='1px solid '+ph.color+'60';b.style.background='rgba(200,164,90,0.06)';
          b.querySelector('div').style.color=ph.color;
        });
        progBtns.push(b);card.appendChild(b);
      });
    }

    ov.appendChild(card);

    // Buttons
    var btnsRow=div({display:'flex',gap:'12px',marginTop:'20px',width:'100%',maxWidth:'340px'});
    if(step>0){
      var backB=btn({flex:'1',padding:'14px',borderRadius:'14px',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'#777',fontSize:'13px',letterSpacing:'2px',fontFamily:'Bebas Neue,cursive'},'RETOUR',function(){step--;render();});
      btnsRow.appendChild(backB);
    }
    var nextLabel=step===2?'COMMENCER':'SUIVANT';
    var nextB=btn({flex:'2',padding:'14px',borderRadius:'14px',background:ph.color,border:'none',color:'#000',fontSize:'14px',letterSpacing:'3px',fontFamily:'Bebas Neue,cursive'},nextLabel,function(){
      if(step<2){step++;render();}
      else{
        // Save and close
        localStorage.setItem('jz_onboarded','1');
        localStorage.setItem('jz_user_poids',String(data.poids));
        localStorage.setItem('jz_user_bench',String(data.bench));
        localStorage.setItem('jz_user_squat',String(data.squat));
        localStorage.setItem('jz_user_dl',String(data.deadlift));
        localStorage.setItem('jz_user_ohp',String(data.ohp));
        localStorage.setItem('jz_user_curl',String(data.curl));
        ov.style.transition='opacity .3s,transform .3s';
        ov.style.opacity='0';ov.style.transform='scale(0.96)';
        setTimeout(function(){if(ov.parentNode)ov.parentNode.removeChild(ov);},300);
      }
    });
    btnsRow.appendChild(nextB);
    ov.appendChild(btnsRow);

    // Skip
    if(step===0){
      var skip=document.createElement('button');
      skip.textContent='Passer';
      skip.style.cssText='background:none;border:none;color:#444;font-size:12px;margin-top:12px;cursor:pointer;padding:8px;touch-action:manipulation';
      skip.addEventListener('click',function(){localStorage.setItem('jz_onboarded','1');ov.parentNode.removeChild(ov);});
      ov.appendChild(skip);
    }

    document.body.appendChild(ov);
  }
  render();
}

R();
requestNotifPermission();
buildSmartNotifBanner();

if(!localStorage.getItem('jz_onboarded'))buildOnboarding();
// Service Worker for offline mode
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    // Check for updates on every load
    reg.update();
    if(reg.waiting) reg.waiting.postMessage('skipWaiting');
    reg.addEventListener('updatefound', function(){
      var newWorker = reg.installing;
      newWorker.addEventListener('statechange', function(){
        if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
          newWorker.postMessage('skipWaiting');
        }
      });
    });
  }).catch(function(){});
  // Reload once when new SW takes control
  var refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(!refreshing){ refreshing=true; window.location.reload(); }
  });
}
if(!sessionStorage.getItem('jacobz_intro')){
  sessionStorage.setItem('jacobz_intro','1');
  showIntro();
}
